<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เปลี่ยนรหัสผ่าน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0d3b8e 0%, #1a55c8 100%);
           min-height: 100vh; display: flex; align-items: center; }
    .card { max-width: 460px; margin: 0 auto; border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,.3); }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-shield-lock text-warning" style="font-size: 3.5rem;"></i>
        <h4 class="fw-bold mt-2">ต้องเปลี่ยนรหัสผ่าน</h4>
        <p class="text-muted small">กรุณาตั้งรหัสผ่านใหม่ก่อนใช้งานครั้งแรก</p>
      </div>
      <form id="cpForm">
        <div class="mb-3">
          <label class="form-label fw-600">รหัสผ่านเดิม</label>
          <input type="password" name="old" class="form-control form-control-lg" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-600">รหัสผ่านใหม่ (อย่างน้อย 6 ตัว)</label>
          <input type="password" name="new" class="form-control form-control-lg" required minlength="6">
        </div>
        <div class="mb-3">
          <label class="form-label fw-600">ยืนยันรหัสผ่านใหม่</label>
          <input type="password" name="confirm" class="form-control form-control-lg" required minlength="6">
        </div>
        <div id="msg" class="alert alert-danger d-none"></div>
        <button type="submit" class="btn btn-warning w-100 btn-lg fw-bold">
          <i class="bi bi-check-circle me-2"></i>เปลี่ยนรหัสผ่าน
        </button>
      </form>
    </div>
  </div>
</div>
<script src="/js/common.js"></script>
<script>
document.getElementById('cpForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const msg = document.getElementById('msg');
  msg.classList.add('d-none');

  if (fd.get('new') !== fd.get('confirm')) {
    msg.textContent = 'รหัสผ่านยืนยันไม่ตรงกัน';
    msg.classList.remove('d-none');
    return;
  }
  try {
    const res = await apiFetch('/api/auth/password', {
      method: 'POST',
      body: JSON.stringify({ old: fd.get('old'), new: fd.get('new') })
    });
    alert(res.message);
    location.href = '/';
  } catch (err) {
    msg.textContent = err.message;
    msg.classList.remove('d-none');
  }
});
</script>
</body>
</html>
