<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมุด QR นักเรียน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <style>
    .controls { background: #f0f4fb; padding: 12px; border-bottom: 2px solid var(--primary); }

    /* ===== A4 page — ใช้ printable area (เผื่อ printer hardware margin) ===== */
    .qr-page {
      width: 190mm;            /* 210 - margin ซ้าย/ขวา 10mm */
      height: 277mm;           /* 297 - margin บน/ล่าง 10mm */
      margin: 8mm auto;
      background: white;
      padding: 0;
      box-sizing: border-box;
      box-shadow: 0 2px 12px rgba(0,0,0,.1);
      page-break-after: always;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .qr-page:last-child { page-break-after: auto; }

    .qr-header {
      text-align: center;
      margin-bottom: 3mm;
      border-bottom: 0.5mm solid #000;
      padding-bottom: 1.5mm;
      flex-shrink: 0;
    }
    .qr-header h4 { margin: 0; font-size: 12pt; font-weight: 700; line-height: 1.1; }
    .qr-header h5 { margin: 0.5mm 0 0 0; font-size: 10pt; font-weight: 600; line-height: 1.1; }

    .qr-grid {
      display: grid;
      gap: 5mm 4mm;      /* เพิ่มช่องว่างระหว่าง QR — กันสแกนติด */
      flex: 1;
      align-content: start;
    }
    .qr-card {
      border: 0.4mm solid #1a5276;    /* เปลี่ยนจาก dashed สีเทา → solid สีเข้ม */
      border-radius: 2mm;
      padding: 2mm 1.5mm;
      text-align: center;
      display: flex; flex-direction: column;
      align-items: center;
      justify-content: center;
      page-break-inside: avoid;
      break-inside: avoid;
      box-sizing: border-box;
      overflow: hidden;
      background: white;
    }
    .qr-card .qrimg {
      display: block;
      flex-shrink: 0;
    }
    /* qrcodejs สร้าง <img>/<canvas> ข้างใน — บังคับให้เต็มกรอบ */
    .qr-card .qrimg img, .qr-card .qrimg canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
    .qr-card .num { font-weight: bold; font-size: 9.5pt; margin-top: 0.8mm; line-height: 1; }
    /* ชื่อใต้ QR — ใหญ่+หนา ให้ครูเวรอ่านได้ทันทีว่าใบไหนของใคร */
    .qr-card .name {
      font-size: 9pt;
      font-weight: 600;
      margin-top: 0.5mm;
      line-height: 1.1;
      max-height: 22pt;
      overflow: hidden;
      word-break: break-word;
    }
    .qr-card .code { font-size: 6.5pt; color: #888; font-family: monospace; line-height: 1; }

    @media print {
      body { background: white; margin: 0; }
      .no-print, nav { display: none !important; }
      /* ใช้ @page margin จัดการขอบกระดาษ + .qr-page ใช้พื้นที่ภายในเต็ม */
      .qr-page {
        box-shadow: none;
        margin: 0;
        width: 100% !important;
        height: 100% !important;
        padding: 0 !important;
        page-break-after: always;
      }
      .qr-page:last-child { page-break-after: auto; }
      @page { size: A4; margin: 10mm; }
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark no-print">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-mortarboard-fill me-2"></i>ตะกั่วทุ่งงานทวีวิทยาคม</a>
    <div id="userBadge" class="d-flex align-items-center"></div>
  </div>
</nav>

<div class="controls no-print">
  <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
    <div class="d-flex gap-2 align-items-center flex-wrap">
      <select id="selClass" class="form-select form-select-sm" style="width:auto;">
        <option value="">-- เลือกห้อง --</option>
      </select>
      <select id="qrSize" class="form-select form-select-sm" style="width:auto;">
        <option value="25">QR เล็ก 25mm (5×6 = 30 ใบ/หน้า)</option>
        <option value="35" selected>QR กลาง 35mm (3×4 = 12 ใบ/หน้า)</option>
        <option value="50">QR ใหญ่ 50mm (2×3 = 6 ใบ/หน้า)</option>
      </select>
      <button class="btn btn-sm btn-primary" onclick="loadQR()">
        <i class="bi bi-arrow-clockwise me-1"></i>โหลด
      </button>
    </div>
    <button class="btn btn-sm btn-success" onclick="window.print()" id="printBtn" disabled>
      <i class="bi bi-printer-fill me-1"></i>พิมพ์
    </button>
  </div>
</div>

<div id="content">
  <div class="qr-page">
    <div class="text-center text-muted py-5">
      <i class="bi bi-qr-code fs-1 d-block mb-2"></i>
      เลือกห้องแล้วกด "โหลด" เพื่อสร้างสมุด QR
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/qrcode.min.js"></script>
<script src="/js/common.js"></script>
<script>
let allClasses = [];

document.addEventListener('DOMContentLoaded', async () => {
  await loadCurrentUser();
  try {
    allClasses = await apiFetch('/api/classes');
    const sel = document.getElementById('selClass');
    sel.innerHTML = '<option value="">-- เลือกห้อง --</option>';
    const grouped = {};
    allClasses.forEach(c => {
      if (!grouped[c.class_level]) grouped[c.class_level] = [];
      grouped[c.class_level].push(c);
    });
    Object.keys(grouped).sort((a,b) => +a - +b).forEach(level => {
      const og = document.createElement('optgroup');
      og.label = `มัธยมศึกษาปีที่ ${level}`;
      grouped[level].forEach(c => {
        const opt = document.createElement('option');
        opt.value = `${c.class_level}_${c.room}`;
        opt.textContent = `ม.${c.class_level}/${c.room}  (${c.count} คน)`;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    });
    // Teacher auto-select
    if (currentUser?.role === 'teacher' && currentUser?.assigned_level && currentUser?.assigned_room) {
      sel.value = `${currentUser.assigned_level}_${currentUser.assigned_room}`;
      sel.disabled = true;
      loadQR();
    }
  } catch (e) { alert(e.message); }
});

async function loadQR() {
  const val = document.getElementById('selClass').value;
  if (!val) { alert('เลือกห้องก่อน'); return; }
  const [level, room] = val.split('_');
  const sizeMm = +document.getElementById('qrSize').value;
  // จำนวน cols/rows + ขนาด row (mm) — คำนวณให้พอดี A4 (พื้นที่ใช้งาน ~277mm)
  // A4: 297 - padding 16 - header 14 - gaps = ~265mm ให้ rows
  let cols, rows, rowMm;
  // ลด rows เผื่อ gap ใหม่ (5mm vertical) — กันล้น A4
  if (sizeMm <= 25)      { cols = 5; rows = 6; rowMm = 34; }  // 6×34+5×5=229
  else if (sizeMm >= 50) { cols = 2; rows = 3; rowMm = 75; }  // 3×75+5×2=235
  else                   { cols = 3; rows = 4; rowMm = 54; }  // 4×54+5×3=231
  const perPage = cols * rows;

  document.getElementById('content').innerHTML =
    '<div class="qr-page"><div class="text-center py-5"><div class="spinner-border text-primary"></div></div></div>';

  try {
    const students = await apiFetch(`/api/students?level=${level}&room=${room}`);
    if (!students.length) {
      document.getElementById('content').innerHTML =
        '<div class="qr-page"><div class="alert alert-warning">ห้องนี้ไม่มีนักเรียน</div></div>';
      return;
    }
    renderBook(students, level, room, sizeMm, cols, perPage, rowMm);
    document.getElementById('printBtn').disabled = false;
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="qr-page"><div class="alert alert-danger">${e.message}</div></div>`;
  }
}

function renderBook(students, level, room, sizeMm, cols, perPage, rowMm) {
  const pages = [];
  for (let i = 0; i < students.length; i += perPage) {
    pages.push(students.slice(i, i + perPage));
  }

  // px request to API server (4x mm for good resolution)
  const qrPx = sizeMm * 4;
  const rows = perPage / cols;

  let html = '';
  pages.forEach((page, pi) => {
    html += `<div class="qr-page">
      <div class="qr-header">
        <h4>โรงเรียนตะกั่วทุ่งงานทวีวิทยาคม</h4>
        <h5>สมุด QR สำหรับเช็คชื่อ — ม.${level}/${room}
          <small class="text-muted">(หน้า ${pi+1}/${pages.length})</small>
        </h5>
      </div>
      <div class="qr-grid" style="grid-template-columns: repeat(${cols}, 1fr); grid-template-rows: repeat(${rows}, ${rowMm}mm);">`;
    page.forEach(s => {
      // QR สร้างในเครื่อง — เร็ว + พิมพ์ได้แม้เน็ตช้า (padding ขาว = quiet zone)
      html += `<div class="qr-card">
        <div class="qrimg" data-qr="${s.id}" data-qr-size="${qrPx}"
          style="width:${sizeMm}mm;height:${sizeMm}mm;padding:1mm;background:#fff;box-sizing:border-box;"></div>
        <div class="num">${s.number ?? '-'}</div>
        <div class="name">${s.name}</div>
        <div class="code">${s.student_code || ''}</div>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('content').innerHTML = html;
  renderLocalQRs();
}
</script>
</body>
</html>
