   key = ชื่อ field เก็บใน data
*/

  { section: 'ตอนที่ 1 ข้อมูลพื้นฐาน' },

  { type:'text', key:'ethnicity', label:'เชื้อชาติ', col:4 },
  { type:'text', key:'religion', label:'ศาสนา', col:4 },
  { type:'text', key:'birthdate', label:'วัน/เดือน/ปีเกิด', col:4 },
  { type:'text', key:'age', label:'อายุ', col:4 },

  { type:'text', key:'prev_school', label:'จบจากโรงเรียน', col:6 },
  { type:'text', key:'prev_gpa', label:'ผลการเรียนเฉลี่ย', col:6 },

  { q:'3. ข้อมูลสุขภาพ' },

  { q:'4. ที่อยู่ของนักเรียน' },
  { type:'textarea', key:'address', label:'ที่อยู่ปัจจุบัน', rows:2 },

  { section: 'ตอนที่ 3 ข้อมูลสถานะครัวเรือน' },
  { type:'radio', key:'q13_house', label:'13. สถานะที่อยู่อาศัย',
    opts:['บ้านของตนเอง/เจ้าของบ้าน','บ้านเช่า (เสียค่าเช่า)','อาศัยอยู่กับผู้อื่น/อยู่โดยไม่ค่าใช้จ่าย','บ้านพัก/หอพัก','อื่น ๆ'] },

  { type:'checkbox', key:'q15_burden', label:'15. ครัวเรือนมีภาระพึ่งพิง',
    opts:['มีคนพิการ/เจ็บป่วยเรื้อรัง','มีผู้สูงอายุ (มากกว่า 60 ปี)','มีคนอายุ 15-60 ปีที่ว่างงาน','เป็นบิดา/มารดาเลี้ยงเดี่ยว','ครัวเรือนไม่มีภาระพึ่งพิง'] },
  { type:'radio', key:'q16_safety', label:'16. ความปลอดภัยของที่อยู่อาศัยและสภาพแวดล้อมบริเวณบ้าน',
    opts:['ดี/มั่นคง/ปลอดภัย/เป็นสัดส่วน','เสี่ยง'] },

  { type:'radio', key:'q18_travel', label:'18. การเดินทางมาโรงเรียนของนักเรียน',

  { type:'text', key:'q18_cost', label:'ค่าใช้จ่ายในการเดินทาง ไป-กลับ (บาท/เดือน)', col:6 },
  { type:'radio', key:'q19_distance', label:'19. ระยะทางจากบ้านถึงโรงเรียน',
    opts:['0-5 กิโลเมตร','6-10 กิโลเมตร','11-15 กิโลเมตร','16-20 กิโลเมตร','21-40 กิโลเมตร','40 กิโลเมตรขึ้นไป'] },
  { type:'radio', key:'q20_time', label:'20. ระยะเวลาในการเดินทางจากบ้านถึงโรงเรียน',

  { type:'checkbox', key:'q23_water', label:'23. แหล่งน้ำดื่ม',
    opts:['น้ำดื่มบรรจุขวด/ตู้หยอดน้ำ','น้ำบ่อ/น้ำบาดาล','น้ำฝน/น้ำประปาภูเขา/ลำธาร','น้ำประปา'] },
  { type:'radio', key:'q24_disaster', label:'24. สภาพที่พักอาศัยและความปลอดภัยด้านภัยพิบัติ',

  { section: 'ตอนที่ 4 ข้อมูลเชิงลึก' },
  { type:'text', key:'q25_friend', label:'25. เพื่อนสนิทของนักเรียน', col:12 },

  { section: 'ตอนที่ 5 ความคิดเห็นครู' },
  { type:'textarea', key:'q27_need', label:'27. สภาพที่น่าเป็นห่วงและความต้องการจำเป็น (การให้ความช่วยเหลือเบื้องต้น)', rows:2 },
  { type:'textarea', key:'q27_summary', label:'ข้อสรุปจากการเยี่ยมบ้าน', rows:3 },
];

document.addEventListener('DOMContentLoaded', async () => {
  await loadCurrentUser();
  try { theme = await (await fetch('/api/public/theme')).json(); } catch(e){}
  buildForm();
  try {
    allClasses = await apiFetch('/api/classes');
    const sel = document.getElementById('selClass');
    const grouped = {};
    allClasses.forEach(c => { (grouped[c.class_level]=grouped[c.class_level]||[]).push(c); });
    Object.keys(grouped).sort((a,b)=>+a-+b).forEach(lv => {
      const og = document.createElement('optgroup'); og.label = `มัธยมศึกษาปีที่ ${lv}`;
      grouped[lv].forEach(c => {
        const o = document.createElement('option');
        o.value = `${c.class_level}_${c.room}`;
        o.textContent = `ม.${c.class_level}/${c.room} (${c.count} คน)`;
        og.appendChild(o);
      });
      sel.appendChild(og);
    });
    if (currentUser?.role==='teacher' && currentUser?.assigned_level) {
      sel.value = `${currentUser.assigned_level}_${currentUser.assigned_room||''}`;
      if (sel.value && sel.value!=='_') loadList();
    }
  } catch(e){ alert(e.message); }
});

function buildForm() {
  const box = document.getElementById('formFields');
  let html = '';
  SCHEMA.forEach((item, i) => {
    if (item.section) { html += `<div class="hv-section-title">${item.section}</div>`; return; }
    if (item.q) { html += `<div class="hv-q">${item.q}</div>`; return; }
    if (item.type === 'text') {
      html += `<div class="d-inline-block me-3 mb-2" style="min-width:${item.col>=12?'100%':item.col>=6?'48%':'31%'}">
        <label class="form-label small fw-600 mb-1">${item.label}</label>
        <input id="hv_${item.key}" class="form-control form-control-sm"></div>`;
    } else if (item.type === 'textarea') {
      html += `<div class="mb-2"><label class="form-label small fw-600 mb-1">${item.label}</label>
        <textarea id="hv_${item.key}" class="form-control" rows="${item.rows||2}"></textarea></div>`;
    } else if (item.type === 'radio' || item.type === 'checkbox') {
      html += `<div class="hv-q">${item.label}</div><div class="hv-opts mb-2">`;
      item.opts.forEach((op, j) => {
        const id = `hv_${item.key}_${j}`;
        const inputType = item.type === 'radio' ? 'radio' : 'checkbox';
        html += `<div class="form-check">
          <input class="form-check-input" type="${inputType}" name="hv_${item.key}" id="${id}" value="${op}">
          <label class="form-check-label small" for="${id}">${op}</label></div>`;
      });
      html += `</div>`;
    }
  });
  box.innerHTML = html;
}

async function loadList() {
  const v = document.getElementById('selClass').value;
  if (!v) return;
  const [level, room] = v.split('_');
  const box = document.getElementById('studentList');
  box.innerHTML = '<div class="text-center text-muted py-4"><div class="spinner-border"></div></div>';
  try {
    curStudents = await apiFetch(`/api/home-visits?level=${level}&room=${room}`);
    renderList();
  } catch(e){ box.innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
}

function renderList() {
  const done = curStudents.filter(s=>s.visited).length, total = curStudents.length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressBar').style.display='';
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progFill').textContent=pct+'%';
  document.getElementById('progText').textContent=`เยี่ยมแล้ว ${done}/${total} คน`;
  document.getElementById('studentList').innerHTML = curStudents.map(s=>`
    <div class="hv-student-row" onclick="openVisit(${s.id})">
      <div class="num">${s.number ?? '-'}</div>
      ${s.photo ? `<img src="/photos/${s.photo}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;">`
                : '<i class="bi bi-person-circle fs-3 text-muted"></i>'}
      <div class="flex-grow-1">
        <div class="fw-600">${s.name}</div>
        <div class="small text-muted">${s.photo_count ? `<i class="bi bi-images"></i> ${s.photo_count} รูป` : 'ยังไม่มีรูป'}${s.visit_date ? ' • '+pcDate(s.visit_date):''}</div>
      </div>
      ${s.visited ? '<span class="hv-badge-done"><i class="bi bi-check-circle"></i> เยี่ยมแล้ว</span>'
                  : '<span class="hv-badge-pending">ยังไม่เยี่ยม</span>'}
    </div>`).join('');
}

async function openVisit(sid) {
  if (!visitModal) visitModal = new bootstrap.Modal('#visitModal');
  try {
    curVisit = await apiFetch(`/api/home-visits/${sid}`);
    const s = curVisit.student, d = curVisit.data || {};
    document.getElementById('mStudentId').value = sid;
    document.getElementById('mTitle').textContent = `${s.name} (ม.${s.class_level}/${s.room})`;
    document.getElementById('mVisited').checked = !!curVisit.visited;
    document.getElementById('mVisitDate').value = curVisit.visit_date || todayISO();
    // prefill ตาม schema
    SCHEMA.forEach(item => {
      if (!item.key) return;
      let val = d[item.key];
      // auto-fill จากข้อมูลนักเรียนถ้ายังว่าง
      if (val==null || val==='') {
        if (item.key==='address') val = s.address;
        if (item.key==='birthdate') val = s.birthdate ? pcDate(s.birthdate) : '';
      }
      if (item.type==='text' || item.type==='textarea') {
        const el = document.getElementById('hv_'+item.key); if (el) el.value = val||'';
      } else if (item.type==='radio') {
        document.querySelectorAll(`input[name="hv_${item.key}"]`).forEach(r => r.checked = (r.value===val));
      } else if (item.type==='checkbox') {
        const arr = Array.isArray(val) ? val : [];
        document.querySelectorAll(`input[name="hv_${item.key}"]`).forEach(c => c.checked = arr.includes(c.value));
      }
    });
    renderPhotos();
    visitModal.show();
  } catch(e){ alert(e.message); }
}

function collectData() {
  const d = {};
  SCHEMA.forEach(item => {
    if (!item.key) return;
    if (item.type==='text' || item.type==='textarea') {
      d[item.key] = (document.getElementById('hv_'+item.key)?.value||'').trim();
    } else if (item.type==='radio') {
      const c = document.querySelector(`input[name="hv_${item.key}"]:checked`);
      d[item.key] = c ? c.value : '';
    } else if (item.type==='checkbox') {
      d[item.key] = [...document.querySelectorAll(`input[name="hv_${item.key}"]:checked`)].map(c=>c.value);
    }
  });
  return d;
}

async function saveVisit() {
  const sid = document.getElementById('mStudentId').value;
  try {
    await apiFetch(`/api/home-visits/${sid}`, { method:'POST',
      body: JSON.stringify({
        visited: document.getElementById('mVisited').checked,
        visit_date: document.getElementById('mVisitDate').value,
        data: collectData()
      })});
    visitModal.hide(); loadList();
  } catch(e){ alert('บันทึกไม่สำเร็จ: '+e.message); }
}

function setVal(id,v){ const el=document.getElementById(id); if(el) el.value=v||''; }
function todayISO(){ return new Date().toISOString().split('T')[0]; }
function pcDate(iso){ if(!iso) return ''; const dt=new Date(iso+'T00:00:00'); if(isNaN(dt))return iso; return `${dt.getDate()} ${THAI_MONTHS_F[dt.getMonth()].slice(0,3)} ${dt.getFullYear()+543}`; }

function renderPhotos() {
  const grid = document.getElementById('photoGrid');
  const photos = curVisit.photos || [];
  grid.innerHTML = photos.length ? photos.map(p=>`
    <div class="hv-thumb-wrap"><img class="hv-thumb" src="/photos/${p}">
      <button class="hv-thumb-del" onclick="delPhoto('${p}')">✕</button></div>`).join('')
    : '<span class="text-muted small">ยังไม่มีรูป</span>';
}

async function uploadPhoto(file) {
  if (!file) return;
  const sid = document.getElementById('mStudentId').value;
  const fd = new FormData(); fd.append('file', file);
  const grid = document.getElementById('photoGrid');
  grid.insertAdjacentHTML('beforeend','<div class="spinner-border spinner-border-sm text-primary" id="upSpin"></div>');
  try {
    const r = await fetch(`/api/home-visits/${sid}/photo`, {method:'POST',body:fd,credentials:'same-origin'});
    const data = await r.json();
    if (data.success){ curVisit.photos.push(data.photo); renderPhotos(); } else alert(data.message);
  } catch(e){ alert('อัพโหลดไม่สำเร็จ: '+e.message); }
  document.getElementById('photoInput').value='';
  document.getElementById('upSpin')?.remove();
}

async function delPhoto(filename) {
  if (!confirm('ลบรูปนี้?')) return;
  const sid = document.getElementById('mStudentId').value;
  try {
    await apiFetch(`/api/home-visits/${sid}/photo`, {method:'DELETE',body:JSON.stringify({filename})});
    curVisit.photos = curVisit.photos.filter(p=>p!==filename); renderPhotos();
  } catch(e){ alert(e.message); }
}

function printOne() {
  const s = curVisit.student, d = collectData();
  const photos = curVisit.photos || [];
  const logo = theme.school_logo ? `<img class="logo" src="${theme.school_logo}">` : '';
  const dot = v => `<span class="dot">${v||'.....................................'}</span>`;
  let body = '';
  SCHEMA.forEach(item => {
    if (item.section) { body += `<div class="doc-sec">${item.section}</div>`; return; }
    if (item.q) { body += `<div class="doc-line"><b>${item.q}</b></div>`; return; }
    const val = d[item.key];
    if (item.type==='text') {
      body += `<div class="doc-line"><span class="lb">${item.label}</span> ${dot(val)}</div>`;
    } else if (item.type==='textarea') {
      body += `<div class="doc-line"><span class="lb">${item.label}</span></div><div class="doc-box">${(val||'').replace(/\n/g,'<br>')}</div>`;
    } else if (item.type==='radio') {
      body += `<div class="doc-line"><span class="lb">${item.label}</span></div><div class="doc-opts">`
            + item.opts.map(op => `<span class="opt">${val===op?'☑':'☐'} ${op}</span>`).join('') + `</div>`;
    } else if (item.type==='checkbox') {
      const arr = Array.isArray(val)?val:[];
      body += `<div class="doc-line"><span class="lb">${item.label}</span></div><div class="doc-opts">`
            + item.opts.map(op => `<span class="opt">${arr.includes(op)?'☑':'☐'} ${op}</span>`).join('') + `</div>`;
    }
  });
  const photoHtml = photos.length ? `
    <div class="doc-sec">ภาพถ่ายประกอบการเยี่ยมบ้าน</div>
    <div class="doc-photos">${photos.map((p,i)=>`<figure><img src="/photos/${p}"><figcaption>ภาพที่ ${i+1}</figcaption></figure>`).join('')}</div>` : '';

  document.getElementById('printArea').innerHTML = `
    <div class="doc-page">
      <div class="doc-head">${logo}
        <h2>แบบเก็บข้อมูลเยี่ยมบ้านนักเรียนรายบุคคล</h2>
        <div class="sub">${theme.school_name||'โรงเรียนตะกั่วทุ่งงานทวีวิทยาคม'}</div>
      </div>
      <div class="doc-line">
        <span class="lb">ชื่อ-นามสกุล</span> ${dot(s.name)}
        <span class="lb">ชั้น</span> ${dot('ม.'+s.class_level+'/'+s.room)}
        <span class="lb">เลขที่</span> ${dot(s.number??'')}
        <span class="lb">วันที่เยี่ยม</span> ${dot(pcDate(document.getElementById('mVisitDate').value))}
      </div>
      ${body}
      ${photoHtml}
      <div class="doc-sign">
        <div><div>ลงชื่อ ………………………………………</div><div>(……………………………………)</div><div>ครูที่ปรึกษา</div></div>
        <div><div>ลงชื่อ ………………………………………</div><div>( ${theme.director_name||'นางสาวปัทมา จีนดี'} )</div><div>ผู้อำนวยการ${theme.school_name||'โรงเรียนตะกั่วทุ่งงานทวีวิทยาคม'}</div></div>
      </div>
    </div>`;
  setTimeout(()=>window.print(), 250);
}
</script>
