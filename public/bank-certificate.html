<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เกียรติบัตรนักออมดีเด่น</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <style>
    .controls { background:#f0f4fb; padding:12px; border-bottom:2px solid var(--primary); }
    /* เกียรติบัตร A4 แนวนอน 1 ใบ/หน้า */
    .cert {
      width:297mm; height:209mm; margin:10mm auto; background:#fff; color:#222;
      box-sizing:border-box; padding:14mm; box-shadow:0 2px 16px rgba(0,0,0,.18);
      font-family:'Sarabun',sans-serif; position:relative; page-break-after:always;
      border:3px double #b8860b; outline:1.5px solid #b8860b; outline-offset:-7mm;
    }
    .cert:last-child { page-break-after:auto; }
    .cert .corner { position:absolute; font-size:30pt; color:#d4af37; }
    .cert .c-tl{top:8mm;left:9mm;} .cert .c-tr{top:8mm;right:9mm;}
    .cert .c-bl{bottom:8mm;left:9mm;} .cert .c-br{bottom:8mm;right:9mm;}
    .cert .inner { text-align:center; height:100%; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:6mm 14mm; }
    .cert .logo { height:22mm; margin-bottom:2mm; }
    .cert .school { font-size:15pt; color:#555; }
    .cert .title { font-size:34pt; font-weight:700; color:#0d3b8e; margin:2mm 0; letter-spacing:1px; }
    .cert .ribbon { font-size:14pt; color:#b8860b; font-weight:600; margin-bottom:3mm; }
    .cert .give { font-size:14pt; color:#444; }
    .cert .name { font-size:30pt; font-weight:700; color:#111; margin:3mm 0; border-bottom:2px dotted #aaa; padding:0 12mm 2mm; }
    .cert .reason { font-size:15pt; color:#333; line-height:1.5; max-width:200mm; }
    .cert .reason .hl { color:#0d8a3e; font-weight:700; font-size:17pt; }
    .cert .foot { display:flex; justify-content:space-around; width:100%; margin-top:9mm; font-size:13pt; }
    .cert .sign { text-align:center; }
    .cert .sign .line { margin-top:12mm; border-top:1px dotted #555; padding-top:1.5mm; min-width:55mm; }
    @media print {
      .no-print, nav { display:none !important; }
      .cert { box-shadow:none; margin:0; }
      @page { size:A4 landscape; margin:0; }
    }
    [data-theme="dark"] .cert { background:#fff; color:#222; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark no-print">
  <div class="container">
    <a class="navbar-brand" href="/bank.html"><i class="bi bi-mortarboard-fill me-2"></i>ตะกั่วทุ่งงานทวีวิทยาคม</a>
    <div id="userBadge" class="d-flex align-items-center"></div>
  </div>
</nav>

<div class="controls no-print">
  <div class="container">
    <div class="row g-2 align-items-end">
      <div class="col-md-3">
        <label class="form-label small fw-600 mb-1">ห้อง</label>
        <select id="selClass" class="form-select form-select-sm"><option value="">ทั้งโรงเรียน</option></select>
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-600 mb-1">มอบให้</label>
        <select id="selMode" class="form-select form-select-sm">
          <option value="balance">นักออมยอดเงินสูงสุด (Top)</option>
          <option value="deposit">นักออมขยันสุดเดือนนี้ (Top)</option>
          <option value="goal">ผู้ทำเป้าหมายสำเร็จ</option>
        </select>
      </div>
      <div class="col-md-2" id="topWrap">
        <label class="form-label small fw-600 mb-1">จำนวน (Top)</label>
        <input type="number" id="topN" class="form-control form-control-sm" value="3" min="1" max="50">
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-600 mb-1">วันที่ออก</label>
        <input type="date" id="certDate" class="form-control form-control-sm">
      </div>
      <div class="col-md-2 d-grid">
        <button class="btn btn-primary btn-sm" onclick="loadCerts()"><i class="bi bi-arrow-clockwise me-1"></i>สร้าง</button>
      </div>
    </div>
    <div class="d-flex justify-content-between align-items-center mt-2">
      <div class="small text-muted"><i class="bi bi-info-circle me-1"></i>เกียรติบัตร A4 แนวนอน 1 ใบ/หน้า • เลือกเกณฑ์แล้วกด "สร้าง"</div>
      <button class="btn btn-dark btn-sm" onclick="window.print()" id="printBtn" disabled><i class="bi bi-printer-fill me-1"></i>พิมพ์</button>
    </div>
  </div>
</div>

<div id="content">
  <div class="text-center text-muted py-5"><i class="bi bi-award fs-1 d-block mb-2"></i>เลือกเงื่อนไขแล้วกด "สร้าง"</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
<script>
let school = 'โรงเรียนตะกั่วทุ่งงานทวีวิทยาคม', logo = '', dirName = '', dirTitle = 'ผู้อำนวยการ';
const money = n => Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2, maximumFractionDigits:2});
function thDate(iso){ if(!iso) return '';
  const m=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const d=new Date(iso+'T00:00:00'); if(isNaN(d)) return iso;
  return `${d.getDate()} ${m[d.getMonth()]} พ.ศ. ${d.getFullYear()+543}`; }

document.addEventListener('DOMContentLoaded', async () => {
  await loadCurrentUser();
  document.getElementById('certDate').value = todayISO();
  document.getElementById('selMode').addEventListener('change', e => {
    document.getElementById('topWrap').style.display = (e.target.value==='goal') ? 'none' : '';
  });
  try {
    const t = await (await fetch('/api/public/theme')).json();
    if (t.school_name) school = t.school_name;
    if (t.school_logo) logo = t.school_logo;
    if (t.director_name) dirName = t.director_name;
    if (t.director_title) dirTitle = t.director_title;
    const classes = await apiFetch('/api/classes');
    const sel = document.getElementById('selClass');
    const g = {}; classes.forEach(c => { (g[c.class_level]=g[c.class_level]||[]).push(c); });
    Object.keys(g).sort((a,b)=>+a-+b).forEach(lv => {
      const og = document.createElement('optgroup'); og.label = `มัธยมศึกษาปีที่ ${lv}`;
      g[lv].forEach(c => { const o=document.createElement('option'); o.value=`${c.class_level}_${c.room}`; o.textContent=`ม.${c.class_level}/${c.room}`; og.appendChild(o); });
      sel.appendChild(og);
    });
    if (currentUser?.role==='teacher' && currentUser?.assigned_level) {
      const v=`${currentUser.assigned_level}_${currentUser.assigned_room||''}`;
      if ([...sel.options].some(o=>o.value===v)) { sel.value=v; }
    }
  } catch(e){ showToast(e.message,'danger'); }
});

async function loadCerts() {
  const mode = document.getElementById('selMode').value;
  const cv = document.getElementById('selClass').value;
  let scope = ''; if (cv){ const [l,r]=cv.split('_'); scope=`&level=${l}&room=${r}`; }
  document.getElementById('content').innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';
  try {
    let list = [];
    if (mode === 'goal') {
      const accs = await apiFetch(`/api/bank/accounts?1=1${scope}`);
      list = accs.filter(a => a.goal>0 && a.balance>=a.goal)
        .map(a => ({name:a.name, class_level:a.class_level, room:a.room, value:a.balance, goal:a.goal}));
    } else {
      const n = parseInt(document.getElementById('topN').value)||3;
      const d = await apiFetch(`/api/bank/leaderboard?by=${mode}&period=month&limit=${n}${scope}`);
      list = d.items.map(x => ({name:x.name, class_level:x.class_level, room:x.room, value:x.value, rank:x.rank}));
    }
    renderCerts(list, mode);
    document.getElementById('printBtn').disabled = !list.length;
  } catch(e){ document.getElementById('content').innerHTML = `<div class="alert alert-danger m-3">${e.message}</div>`; }
}

function renderCerts(list, mode) {
  if (!list.length) {
    document.getElementById('content').innerHTML = '<div class="alert alert-warning m-3">ไม่พบนักเรียนตามเงื่อนไข (ผู้ทำเป้าหมายสำเร็จต้องตั้งเป้า + มียอดถึงเป้า)</div>';
    return;
  }
  const dateTxt = thDate(document.getElementById('certDate').value);
  const logoHtml = logo ? `<img class="logo" src="${logo}" alt="">` : '<i class="bi bi-bank2" style="font-size:40pt;color:#0d3b8e;"></i>';
  document.getElementById('content').innerHTML = list.map(s => {
    let ribbon, reason;
    if (mode === 'goal') {
      ribbon = 'นักออมผู้ทำเป้าหมายสำเร็จ';
      reason = `ได้บรรลุเป้าหมายการออมเงิน <span class="hl">${money(s.goal)} บาท</span><br>ด้วยความมุ่งมั่น มีวินัย และรู้จักการประหยัดอดออม`;
    } else {
      const rankTxt = s.rank ? `อันดับที่ ${s.rank} ` : '';
      ribbon = mode==='deposit' ? 'นักออมขยันดีเด่นประจำเดือน' : 'นักออมเงินดีเด่น';
      reason = `เป็นนักออม${mode==='deposit'?'ที่มีความขยันออมเงินอย่างสม่ำเสมอ':'ที่มียอดเงินออมดีเด่น'} ${rankTxt}<br>มียอดเงินออม <span class="hl">${money(s.value)} บาท</span> สมควรได้รับการยกย่อง`;
    }
    return `<div class="cert">
      <span class="corner c-tl">❖</span><span class="corner c-tr">❖</span>
      <span class="corner c-bl">❖</span><span class="corner c-br">❖</span>
      <div class="inner">
        ${logoHtml}
        <div class="school">${school}</div>
        <div class="title">เกียรติบัตรฉบับนี้ให้ไว้เพื่อแสดงว่า</div>
        <div class="ribbon">★ ${ribbon} ★</div>
        <div class="name">${s.name}</div>
        <div class="scls" style="font-size:13pt;color:#555;margin-bottom:3mm;">ชั้นมัธยมศึกษาปีที่ ${s.class_level}/${s.room}</div>
        <div class="reason">${reason}</div>
        <div class="foot">
          <div class="sign"><div class="line">ให้ไว้ ณ วันที่</div>${dateTxt}</div>
          <div class="sign"><div class="line">ลงชื่อ</div>(${dirName||'.....................'})<br>${dirTitle}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
