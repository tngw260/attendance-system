<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>บัตรนักเรียน (CR80)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <style>
    /* ===== หน้า A4 ===== */
    .controls { background: #f0f4fb; padding: 12px; border-bottom: 2px solid var(--primary); }
    .card-page {
      width: 210mm;
      min-height: 297mm;
      margin: 16px auto;
      background: white;
      padding: 10mm 10mm;
      box-sizing: border-box;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
      display: grid;
      grid-template-columns: repeat(2, 85.6mm);
      grid-auto-rows: 54mm;
      gap: 6mm 6mm;
      justify-content: center;
      align-content: start;
      page-break-after: always;
    }
    .card-page:last-child { page-break-after: auto; }

    /* ===== บัตร CR80 มาตรฐาน 85.6 × 54 mm — Layout ใหม่ ===== */
    .student-card {
      width: 85.6mm;
      height: 54mm;
      border-radius: 3mm;
      padding: 0;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: 24mm 1fr 22mm;
      grid-template-rows: 8mm 1fr 7mm;
      grid-template-areas:
        "head head head"
        "photo info qr"
        "foot foot foot";
      gap: 0;
      position: relative;
      overflow: hidden;
      page-break-inside: avoid;
      color: #1a1a1a;
      font-size: 8pt;
      line-height: 1.2;
      border: 0.3mm solid rgba(0,0,0,.2);
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }
    /* แถบสีทองด้านซ้ายของบัตร (accent) */
    .student-card::before {
      content: '';
      position: absolute;
      left: 0; top: 8mm; bottom: 7mm;
      width: 1.5mm;
      background: linear-gradient(180deg, #d4a017, #b8870c);
      z-index: 1;
    }

    /* HEADER */
    .sc-head {
      grid-area: head;
      display: flex;
      align-items: center;
      gap: 2mm;
      padding: 1mm 3mm;
      background: linear-gradient(90deg, rgba(13,59,142,.92), rgba(26,85,200,.7) 60%, transparent);
      color: white;
      border-bottom: 0.3mm solid rgba(212,160,23,.6);
    }
    .sc-head .logo {
      width: 6.5mm; height: 6.5mm; border-radius: 50%;
      background: white; padding: 0.3mm;
      object-fit: contain;
      flex-shrink: 0;
      box-shadow: 0 0.2mm 0.5mm rgba(0,0,0,.2);
    }
    .sc-head .titles { flex: 1; min-width: 0; }
    .sc-head .school {
      font-weight: 700;
      font-size: 8pt;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.1pt;
    }
    .sc-head .badge-id {
      font-size: 5.5pt;
      letter-spacing: 0.5pt;
      opacity: .85;
      text-transform: uppercase;
      margin-top: -0.2mm;
    }

    /* PHOTO */
    .sc-photo, .sc-photo-placeholder {
      grid-area: photo;
      width: 21mm; height: 28mm;
      margin: 3mm auto 0;
      border-radius: 1.2mm;
      object-fit: cover;
      border: 0.4mm solid rgba(255,255,255,.95);
      box-shadow: 0 0.3mm 1mm rgba(0,0,0,.25);
      background: white;
    }
    .sc-photo-placeholder {
      display: flex; align-items: center; justify-content: center;
      color: rgba(0,0,0,.35); font-size: 13pt;
    }

    /* INFO (กลาง) */
    .sc-info {
      grid-area: info;
      padding: 2.5mm 2mm 0 2mm;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5mm;
    }
    .sc-info .name {
      font-size: 11pt;
      font-weight: 800;
      line-height: 1.1;
      color: #0d3b8e;
      margin-bottom: 1.5mm;
      padding-bottom: 1mm;
      border-bottom: 0.25mm solid rgba(13,59,142,.25);
      /* บังคับ 1 บรรทัด — ถ้าเกินจะ ellipsis แต่ JS จะ shrink ก่อน */
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .sc-info .info-grid {
      display: grid;
      grid-template-columns: 16mm 1fr;
      gap: 1mm 1.5mm;
      font-size: 8pt;
      line-height: 1.2;
    }
    .sc-info .info-grid .label {
      color: rgba(0,0,0,.55);
      font-weight: 500;
    }
    .sc-info .info-grid .value {
      font-weight: 700;
      color: #1a1a1a;
    }
    .sc-info .info-grid .value.code-val {
      font-family: 'Courier New', monospace;
      letter-spacing: 0.5pt;
      color: #0d3b8e;
    }

    /* QR — wrapper รวม QR + label ติดกัน */
    .sc-qr-wrap {
      grid-area: qr;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 3mm;
    }
    .sc-qr {
      width: 20mm; height: 20mm;
      background: white;
      padding: 0.5mm;
      border-radius: 1mm;
      border: 0.2mm solid rgba(0,0,0,.15);
    }
    .sc-qr img { width: 100%; height: 100%; display: block; }
    .sc-qr-label {
      font-size: 5pt;
      color: rgba(0,0,0,.55);
      margin-top: 0.6mm;
      letter-spacing: 0.5pt;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* FOOTER — ลายเซ็น ผอ. */
    .sc-sign {
      grid-area: foot;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3mm;
      font-size: 6pt;
      line-height: 1.15;
      background: rgba(13,59,142,.06);
      border-top: 0.25mm solid rgba(13,59,142,.2);
    }
    .sc-sign .left-note {
      color: rgba(0,0,0,.5);
      font-style: italic;
      font-size: 5.5pt;
    }
    .sc-sign .sig-block {
      text-align: center;
      line-height: 1.1;
    }
    .sc-sign .sig-block .sig-name {
      font-weight: 700;
      color: #0d3b8e;
      font-size: 6pt;
    }
    .sc-sign .sig-block .sig-title {
      font-size: 5.2pt;
      color: rgba(0,0,0,.6);
      letter-spacing: 0.2pt;
    }

    /* ===== ด้านหลังบัตร ===== */
    .student-card.back {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr auto;
      padding: 2.5mm 3mm;
      gap: 1mm 0;
    }
    .student-card.back .sc-back-body {
      display: grid;
      grid-template-columns: 1fr 20mm;
      gap: 1.5mm 2mm;
      font-size: 7pt;
      line-height: 1.4;
    }
    .student-card.back .sc-back-body .emergency b {
      font-weight: 600; opacity: .75;
      display: inline-block; min-width: 18mm;
    }
    .student-card.back .sc-back-body .blank {
      display: inline-block;
      border-bottom: 0.3mm solid rgba(0,0,0,.5);
      min-width: 25mm;
      height: 3mm;
    }
    .student-card.back .pcode-block {
      text-align: center;
      font-size: 6.5pt;
    }
    .student-card.back .pcode-block .pcode-qr {
      width: 18mm; height: 18mm; background: white;
      padding: 0.5mm; border-radius: 1mm; margin: 0 auto;
    }
    .student-card.back .pcode-block .pcode-qr img { width: 100%; height: 100%; display: block; }
    .student-card.back .pcode-block .pcode-text {
      font-family: 'Courier New', monospace;
      font-weight: 700; letter-spacing: 0.5pt;
      font-size: 8pt; margin-top: 0.3mm;
    }
    .student-card.back .sc-footer {
      font-size: 5.8pt;
      line-height: 1.25;
      text-align: center;
      opacity: .8;
      border-top: 0.3mm solid rgba(0,0,0,.2);
      padding-top: 0.8mm;
    }
    .student-card.back .back-title {
      font-weight: 700;
      font-size: 8pt;
      text-align: center;
      border-bottom: 0.3mm solid rgba(0,0,0,.25);
      padding-bottom: 0.8mm;
    }
    .student-card.back .back-title .year {
      font-size: 6.5pt; font-weight: 500; opacity: .8;
    }

    /* ===== ธีมพื้นหลัง ===== */
    .theme-green   { background: linear-gradient(135deg, #d1f4e0 0%, #74c69d 100%); }
    .theme-blue    { background: linear-gradient(135deg, #cfe8ff 0%, #4a90e2 100%); color:#0d1b2a;}
    .theme-purple  { background: linear-gradient(135deg, #e9d8fd 0%, #9f7aea 100%); color:#1a1a2e;}
    .theme-pink    { background: linear-gradient(135deg, #ffe0ec 0%, #ff6f91 100%); color:#3a0a1a;}
    .theme-gold    { background: linear-gradient(135deg, #fff5cc 0%, #f6c453 100%); color:#3a2a05;}
    .theme-dark    { background: linear-gradient(135deg, #2c3e50 0%, #1a1a1a 100%); color:#f5f5f5;}
    .theme-dark .sc-info .name { color: #ffd86b; border-bottom-color: rgba(255,216,107,.4); }
    .theme-dark .sc-info .info-grid .label { color: rgba(255,255,255,.7); }
    .theme-dark .sc-info .info-grid .value { color: #ffffff; }
    .theme-dark .sc-info .code-row { color: rgba(255,255,255,.6); border-top-color: rgba(255,255,255,.2); }
    .theme-dark .sc-photo, .theme-dark .sc-photo-placeholder { border-color: rgba(255,255,255,.6); }
    .theme-dark .sc-qr-label { color: rgba(255,255,255,.7); }
    .theme-dark .sc-sign { background: rgba(0,0,0,.3); border-top-color: rgba(255,216,107,.3); }
    .theme-dark .sc-sign .sig-block .sig-name { color: #ffd86b; }
    .theme-dark .sc-sign .sig-block .sig-title { color: rgba(255,255,255,.6); }
    .theme-dark .sc-sign .left-note { color: rgba(255,255,255,.5); }

    .theme-white   { background: #fff; border: 0.4mm solid #1a5276; }
    .theme-school  { background: linear-gradient(135deg, #ffffff 0%, color-mix(in srgb, var(--primary, #1a5276) 25%, white) 100%); }

    /* ===== Print ===== */
    @media print {
      body { background: white; margin: 0; }
      .no-print, nav { display: none !important; }
      .card-page {
        box-shadow: none;
        margin: 0;
        padding: 10mm;
        page-break-after: always;
      }
      .card-page:last-child { page-break-after: auto; }
      @page { size: A4; margin: 0; }
      .student-card { box-shadow: none; }
    }

    .theme-preview {
      width: 26px; height: 18px;
      border-radius: 3px; border: 1px solid #ccc;
      display: inline-block; vertical-align: middle; margin-right: 4px;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark no-print">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-mortarboard-fill me-2"></i>ตะกั่วทุ่งงานทวีวิทยาคม</a>
    <div id="userBadge" class="d-flex align-items-center"></div>
  </div>
</nav>

<div class="controls no-print">
  <div class="container">
    <div class="row g-2 align-items-end">
      <div class="col-md-3">
        <label class="form-label small fw-600 mb-1">ห้อง</label>
        <select id="selClass" class="form-select form-select-sm">
          <option value="">-- เลือกห้อง --</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-600 mb-1">ด้านที่พิมพ์</label>
        <select id="selSide" class="form-select form-select-sm" onchange="loadCards()">
          <option value="front" selected>ด้านหน้า</option>
          <option value="back">ด้านหลัง</option>
          <option value="both">ทั้งสองด้าน (สลับหน้า)</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-600 mb-1">ธีมพื้นหลัง</label>
        <select id="selTheme" class="form-select form-select-sm" onchange="applyTheme()">
          <option value="theme-school">ตามสีโรงเรียน</option>
          <option value="theme-green" selected>เขียวพาสเทล</option>
          <option value="theme-blue">ฟ้าน้ำทะเล</option>
          <option value="theme-purple">ม่วงลาเวนเดอร์</option>
          <option value="theme-pink">ชมพูพีช</option>
          <option value="theme-gold">ทองอ่อน</option>
          <option value="theme-dark">ดำหรู</option>
          <option value="theme-white">ขาวเรียบ (ประหยัดหมึก)</option>
        </select>
      </div>
      <div class="col-md-1">
        <button class="btn btn-sm btn-primary w-100" onclick="loadCards()" title="โหลด">
          <i class="bi bi-arrow-clockwise"></i>
        </button>
      </div>
      <div class="col-md-2">
        <button class="btn btn-sm btn-success w-100" onclick="window.print()" id="printBtn" disabled>
          <i class="bi bi-printer-fill me-1"></i>พิมพ์
        </button>
      </div>
      <div class="col-md-2 small text-muted">
        <i class="bi bi-info-circle"></i> CR80 85.6×54mm<br>
        <span class="text-secondary">8 ใบ/A4</span>
      </div>
    </div>
  </div>
</div>

<div id="content">
  <div class="card-page" style="grid-template-columns:1fr; min-height:auto;">
    <div class="text-center text-muted py-5">
      <i class="bi bi-credit-card-2-front fs-1 d-block mb-2"></i>
      เลือกห้อง + ธีม แล้วกด "โหลด" เพื่อสร้างบัตรนักเรียน<br>
      <small>ขนาดมาตรฐาน CR80 (เท่ากับบัตรประชาชน/บัตรเครดิต)</small>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
<script>
let allClasses = [];
let schoolLogo = '';
let schoolName = 'โรงเรียนตะกั่วทุ่งงานทวีวิทยาคม';
let directorName = 'นางสาวปัทมา จีนดี';
let directorTitle = 'ผู้อำนวยการ';

document.addEventListener('DOMContentLoaded', async () => {
  await loadCurrentUser();
  try {
    const theme = await (await fetch('/api/public/theme')).json();
    schoolLogo = theme.school_logo || '';
    if (theme.school_name) schoolName = theme.school_name;
    if (theme.director_name) directorName = theme.director_name;
    if (theme.director_title) directorTitle = theme.director_title;

    allClasses = await apiFetch('/api/classes');
    const sel = document.getElementById('selClass');
    sel.innerHTML = '<option value="">-- เลือกห้อง --</option>';
    const grouped = {};
    allClasses.forEach(c => {
      if (!grouped[c.class_level]) grouped[c.class_level] = [];
      grouped[c.class_level].push(c);
    });
    Object.keys(grouped).sort((a,b) => +a - +b).forEach(level => {
      const og = document.createElement('optgroup');
      og.label = `มัธยมศึกษาปีที่ ${level}`;
      grouped[level].forEach(c => {
        const opt = document.createElement('option');
        opt.value = `${c.class_level}_${c.room}`;
        opt.textContent = `ม.${c.class_level}/${c.room}  (${c.count} คน)`;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    });
    if (currentUser?.role === 'teacher' && currentUser?.assigned_level && currentUser?.assigned_room) {
      sel.value = `${currentUser.assigned_level}_${currentUser.assigned_room}`;
      sel.disabled = true;
      loadCards();
    }
  } catch (e) { alert(e.message); }
});

function applyTheme() {
  const newTheme = document.getElementById('selTheme').value;
  document.querySelectorAll('.student-card').forEach(c => {
    // remove all theme-* classes
    [...c.classList].filter(x => x.startsWith('theme-')).forEach(x => c.classList.remove(x));
    c.classList.add(newTheme);
  });
}

async function loadCards() {
  const val = document.getElementById('selClass').value;
  if (!val) { alert('เลือกห้องก่อน'); return; }
  const [level, room] = val.split('_');
  document.getElementById('content').innerHTML =
    '<div class="card-page" style="grid-template-columns:1fr; min-height:auto;"><div class="text-center py-5"><div class="spinner-border text-primary"></div></div></div>';

  try {
    const students = await apiFetch(`/api/students?level=${level}&room=${room}`);
    if (!students.length) {
      document.getElementById('content').innerHTML =
        '<div class="card-page"><div class="alert alert-warning">ห้องนี้ไม่มีนักเรียน</div></div>';
      return;
    }
    renderCards(students, level, room);
    document.getElementById('printBtn').disabled = false;
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="card-page"><div class="alert alert-danger">${e.message}</div></div>`;
  }
}

function renderCards(students, level, room) {
  const perPage = 8; // 2 col × 4 row CR80 บน A4
  const theme = document.getElementById('selTheme').value;
  const side = document.getElementById('selSide').value;
  const pages = [];
  for (let i = 0; i < students.length; i += perPage) {
    pages.push(students.slice(i, i + perPage));
  }

  let html = '';
  pages.forEach(page => {
    if (side === 'front' || side === 'both') {
      html += renderPage(page, theme, 'front');
    }
    if (side === 'back' || side === 'both') {
      html += renderPage(page, theme, 'back');
    }
  });
  document.getElementById('content').innerHTML = html;

  // Auto-shrink ชื่อนักเรียนทุกใบให้พอดี (รัน 2 รอบ — กัน font ยังไม่โหลด)
  requestAnimationFrame(() => {
    autoShrinkNames();
    setTimeout(autoShrinkNames, 200); // อีกครั้งหลัง font + image โหลด
  });
}

function autoShrinkNames() {
  document.querySelectorAll('.student-card:not(.back) .sc-info .name').forEach(el => {
    // เริ่มจาก 11pt — ลดทีละ 0.5pt จนข้อความไม่ล้นแนวนอน
    let size = 11;
    el.style.fontSize = size + 'pt';
    while (el.scrollWidth > el.clientWidth && size > 6) {
      size -= 0.5;
      el.style.fontSize = size + 'pt';
    }
  });
}

function renderPage(students, theme, side) {
  let html = `<div class="card-page">`;
  students.forEach(s => {
    html += (side === 'front')
      ? renderFront(s, theme)
      : renderBack(s, theme);
  });
  html += `</div>`;
  return html;
}

function renderFront(s, theme) {
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&margin=0&data=${s.id}`;
  const photoHtml = s.photo
    ? `<img class="sc-photo" src="/photos/${s.photo}" alt="">`
    : `<div class="sc-photo-placeholder"><i class="bi bi-person"></i></div>`;
  const logoHtml = schoolLogo
    ? `<img class="logo" src="${schoolLogo}" alt="">`
    : `<div class="logo" style="background:rgba(255,255,255,.3);"></div>`;
  const year = academicYearBE();

  return `<div class="student-card ${theme}">
    <div class="sc-head">
      ${logoHtml}
      <div class="titles">
        <div class="school">${schoolName}</div>
        <div class="badge-id">บัตรประจำตัวนักเรียน • ปีการศึกษา ${year}</div>
      </div>
    </div>
    ${photoHtml}
    <div class="sc-info">
      <div class="name">${s.name}</div>
      <div class="info-grid">
        <span class="label">ชั้น</span>
        <span class="value">ม.${s.class_level}/${s.room}</span>
        <span class="label">เลขประจำตัว</span>
        <span class="value code-val">${s.student_code || '-'}</span>
      </div>
    </div>
    <div class="sc-qr-wrap">
      <div class="sc-qr"><img src="${qrUrl}" alt="QR"></div>
      <div class="sc-qr-label">SCAN</div>
    </div>
    <div class="sc-sign">
      <div class="left-note">บัตรนี้เป็นกรรมสิทธิ์ของโรงเรียน</div>
      <div class="sig-block">
        <div class="sig-name">${directorName}</div>
        <div class="sig-title">${directorTitle}</div>
      </div>
    </div>
  </div>`;
}

function renderBack(s, theme) {
  const year = academicYearBE();
  const pcode = s.parent_code || '------';
  const parentUrl = `${location.origin}/parent.html?code=${s.parent_code || ''}`;
  const pqrUrl = s.parent_code
    ? `https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=0&data=${encodeURIComponent(parentUrl)}`
    : '';

  const pcodeBlock = s.parent_code
    ? `<div class="pcode-block">
         <div class="pcode-qr"><img src="${pqrUrl}" alt="QR"></div>
         <div class="pcode-text">${pcode}</div>
         <div style="font-size:5.5pt;opacity:.75;">รหัสผู้ปกครอง</div>
       </div>`
    : `<div class="pcode-block" style="display:flex;align-items:center;justify-content:center;font-size:6pt;opacity:.5;">
         <div>(ยังไม่มี<br>รหัสผู้ปกครอง)</div>
       </div>`;

  return `<div class="student-card back ${theme}">
    <div class="back-title">
      บัตรประจำตัวนักเรียน
      <div class="year">ปีการศึกษา ${year} • ${s.name}</div>
    </div>
    <div class="sc-back-body">
      <div class="emergency">
        <div><b>กรุ๊ปเลือด</b> <span class="blank"></span></div>
        <div><b>โรคประจำตัว</b> <span class="blank" style="min-width:30mm;"></span></div>
        <div><b>แพ้ยา/อาหาร</b> <span class="blank" style="min-width:30mm;"></span></div>
        <div><b>เบอร์ผู้ปกครอง</b> <span class="blank" style="min-width:28mm;"></span></div>
        <div><b>ที่อยู่ฉุกเฉิน</b> <span class="blank" style="min-width:30mm;"></span></div>
      </div>

    </div>
    <div class="sc-footer">
      <i class="bi bi-info-circle"></i> หากพบบัตรนี้ กรุณาส่งคืน${schoolName} โทร. ___________
      <br>* ผู้ปกครองสแกน QR เพื่อดูข้อมูลบุตรหลานได้ตลอด 24 ชม.
    </div>
  </div>`;
}

function academicYearBE() {
  const d = new Date();
  // ปีการศึกษาไทย: พ.ค. - มี.ค. → ถ้า ม.ค.-เม.ย. = ปีก่อน, พ.ค.+ = ปีปัจจุบัน
  const m = d.getMonth() + 1;
  const yearAD = (m >= 5) ? d.getFullYear() : d.getFullYear() - 1;
  return yearAD + 543;
}
