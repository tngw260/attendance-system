<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>บัตรนักเรียน (QR)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <style>
    .controls { background: #f0f4fb; padding: 12px; border-bottom: 2px solid var(--primary); }
    .card-page { max-width: 794px; margin: 16px auto; background: white;
                 padding: 12mm; box-shadow: 0 2px 12px rgba(0,0,0,.1);
                 display: grid; grid-template-columns: repeat(2, 1fr); gap: 6mm; }
    .student-card {
      border: 2px solid var(--primary, #1a5276);
      border-radius: 10px;
      padding: 10px;
      display: flex; align-items: center; gap: 10px;
      page-break-inside: avoid;
      background: linear-gradient(135deg, #fff, #f8fafd);
      min-height: 120px;
    }
    .student-card .logo {
      width: 36px; height: 36px; border-radius: 50%;
      position: absolute; top: 6px; right: 6px;
      background: white; padding: 2px;
    }
    .student-card-inner { position: relative; flex: 1; }
    .student-card .school { font-size: .65rem; color: #666; text-transform: uppercase; }
    .student-card .name { font-weight: bold; font-size: .95rem; line-height: 1.2; margin: 2px 0; }
    .student-card .meta { font-size: .78rem; color: #555; }
    .student-card .code { font-family: monospace; font-size: .75rem; color: #888; }
    .student-card .photo {
      width: 70px; height: 90px;
      border: 1px solid #ccc; border-radius: 4px;
      object-fit: cover; flex-shrink: 0;
      background: #f0f0f0;
    }
    .student-card .qr {
      width: 90px; height: 90px;
      flex-shrink: 0;
    }
    @media print {
      body { background: white; }
      .no-print, nav { display: none !important; }
      .card-page { box-shadow: none; margin: 0; padding: 8mm; max-width: 100%; }
      @page { size: A4; margin: 8mm; }
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark no-print">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-mortarboard-fill me-2"></i>ตะกั่วทุ่งงานทวีวิทยาคม</a>
    <div id="userBadge" class="d-flex align-items-center"></div>
  </div>
</nav>

<div class="controls no-print">
  <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
    <div class="d-flex gap-2 align-items-center flex-wrap">
      <select id="selClass" class="form-select form-select-sm" style="width:auto;">
        <option value="">-- เลือกห้อง --</option>
      </select>
      <button class="btn btn-sm btn-primary" onclick="loadCards()">
        <i class="bi bi-arrow-clockwise me-1"></i>โหลด
      </button>
      <small class="text-muted">8 บัตร/หน้า — ตัดออกตามเส้นปะ</small>
    </div>
    <button class="btn btn-sm btn-success" onclick="window.print()" id="printBtn" disabled>
      <i class="bi bi-printer-fill me-1"></i>พิมพ์
    </button>
  </div>
</div>

<div id="content">
  <div class="card-page" style="grid-template-columns:1fr;">
    <div class="text-center text-muted py-5">
      <i class="bi bi-credit-card-2-front fs-1 d-block mb-2"></i>
      เลือกห้องแล้วกด "โหลด" เพื่อสร้างบัตรนักเรียน
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
<script>
let allClasses = [];
let schoolLogo = '';

document.addEventListener('DOMContentLoaded', async () => {
  await loadCurrentUser();
  try {
    const theme = await (await fetch('/api/public/theme')).json();
    schoolLogo = theme.school_logo || '';
    allClasses = await apiFetch('/api/classes');
    const sel = document.getElementById('selClass');
    sel.innerHTML = '<option value="">-- เลือกห้อง --</option>';
    const grouped = {};
    allClasses.forEach(c => {
      if (!grouped[c.class_level]) grouped[c.class_level] = [];
      grouped[c.class_level].push(c);
    });
    Object.keys(grouped).sort((a,b) => +a - +b).forEach(level => {
      const og = document.createElement('optgroup');
      og.label = `มัธยมศึกษาปีที่ ${level}`;
      grouped[level].forEach(c => {
        const opt = document.createElement('option');
        opt.value = `${c.class_level}_${c.room}`;
        opt.textContent = `ม.${c.class_level}/${c.room}  (${c.count} คน)`;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    });
    if (currentUser?.role === 'teacher' && currentUser?.assigned_level && currentUser?.assigned_room) {
      sel.value = `${currentUser.assigned_level}_${currentUser.assigned_room}`;
      sel.disabled = true;
      loadCards();
    }
  } catch (e) { alert(e.message); }
});

async function loadCards() {
  const val = document.getElementById('selClass').value;
  if (!val) { alert('เลือกห้องก่อน'); return; }
  const [level, room] = val.split('_');
  document.getElementById('content').innerHTML =
    '<div class="card-page" style="grid-template-columns:1fr;"><div class="text-center py-5"><div class="spinner-border text-primary"></div></div></div>';

  try {
    const students = await apiFetch(`/api/students?level=${level}&room=${room}`);
    if (!students.length) {
      document.getElementById('content').innerHTML =
        '<div class="card-page"><div class="alert alert-warning">ห้องนี้ไม่มีนักเรียน</div></div>';
      return;
    }
    renderCards(students, level, room);
    document.getElementById('printBtn').disabled = false;
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="card-page"><div class="alert alert-danger">${e.message}</div></div>`;
  }
}

function renderCards(students, level, room) {
  const perPage = 8;
  const pages = [];
  for (let i = 0; i < students.length; i += perPage) {
    pages.push(students.slice(i, i + perPage));
  }

  let html = '';
  pages.forEach(page => {
    html += `<div class="card-page">`;
    page.forEach(s => {
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=90x90&margin=1&data=${s.id}`;
      const photoHtml = s.photo
        ? `<img class="photo" src="/photos/${s.photo}">`
        : `<div class="photo d-flex align-items-center justify-content-center text-muted">
             <i class="bi bi-person fs-1"></i>
           </div>`;
      const logoHtml = schoolLogo
        ? `<img class="logo" src="${schoolLogo}">`
        : '';
      html += `<div class="student-card">
        ${photoHtml}
        <div class="student-card-inner">
          ${logoHtml}
          <div class="school">โรงเรียนตะกั่วทุ่งงานทวีวิทยาคม</div>
          <div class="name">${s.name}</div>
          <div class="meta">ม.${s.class_level}/${s.room} • เลขที่ ${s.number ?? '-'}</div>
          <div class="code">${s.student_code || ''}</div>
        </div>
        <img class="qr" src="${qrUrl}">
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('content').innerHTML = html;
}
</script>
</body>
</html>
