<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สแกน QR เช็คชื่อ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <style>
    body { background: #1a1a1a; color: white; }
    #reader {
      width: 100%; max-width: 500px; margin: 0 auto;
      border-radius: 12px; overflow: hidden;
      background: black;
    }
    #reader video { width: 100% !important; }
    .scan-status {
      padding: 12px 16px; border-radius: 10px;
      background: rgba(255,255,255,.1);
      margin-bottom: 12px;
    }
    .recent-scan {
      background: rgba(255,255,255,.1);
      padding: 12px; border-radius: 10px;
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 10px;
      transition: opacity .3s;
    }
    .recent-scan.was-already { opacity: .6; border-left: 3px solid #ffc107; }
    .recent-scan.success { border-left: 3px solid #198754; }
    .recent-scan.error { background: #842029; border-left: 3px solid #dc3545; }
    .recent-scan.removed { opacity: .3; text-decoration: line-through; }
    .recent-scan .btn-undo {
      background: rgba(220,53,69,.85);
      color: white; border: none;
      padding: 4px 10px; border-radius: 6px;
      font-size: .78rem; font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }
    .recent-scan .btn-undo:hover { background: #dc3545; }
    .recent-scan .btn-undo:disabled { opacity: .5; cursor: not-allowed; }

    /* CONFIRM BANNER */
    #confirmBanner {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(13, 59, 142, .98);
      color: white;
      padding: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,.4);
      z-index: 9999;
      transform: translateY(-120%);
      transition: transform .25s ease;
      display: flex; align-items: center; gap: 14px;
    }
    #confirmBanner.show { transform: translateY(0); }
    #confirmBanner.confirming-error { background: rgba(220, 53, 69, .98); }
    #confirmBanner .cb-photo {
      width: 56px; height: 56px; border-radius: 50%;
      object-fit: cover; background: white; flex-shrink: 0;
      border: 2px solid white;
    }
    #confirmBanner .cb-info { flex-grow: 1; min-width: 0; }
    #confirmBanner .cb-info .name { font-weight: 700; font-size: 1.05rem; line-height: 1.2; }
    #confirmBanner .cb-info .meta { font-size: .85rem; opacity: .9; }
    #confirmBanner .cb-status {
      font-size: 1rem; font-weight: 700;
      padding: 4px 12px; border-radius: 50px;
      background: rgba(255,255,255,.25);
      white-space: nowrap;
    }
    #confirmBanner .cb-actions { display: flex; gap: 6px; flex-shrink: 0; }
    #confirmBanner .cb-actions button {
      border: none; padding: 8px 14px; border-radius: 8px;
      font-weight: 700; cursor: pointer; font-size: .9rem;
    }
    #confirmBanner .cb-cancel { background: #dc3545; color: white; }
    #confirmBanner .cb-ok { background: #198754; color: white; }
    @media (max-width: 575px) {
      #confirmBanner { flex-wrap: wrap; }
      #confirmBanner .cb-actions { width: 100%; justify-content: stretch; }
      #confirmBanner .cb-actions button { flex: 1; }
    }

    /* Camera pause overlay */
    .cam-pause {
      position: relative;
    }
    .cam-pause::after {
      content: '✅ บันทึกแล้ว';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(25, 135, 84, .9);
      color: white;
      padding: 8px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.1rem;
      animation: cam-pop .3s ease;
      z-index: 10;
    }
    @keyframes cam-pop {
      0% { transform: translate(-50%, -50%) scale(.5); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    .status-pill {
      display: inline-block; padding: 4px 12px;
      border-radius: 20px; font-size: .85rem; font-weight: 600;
    }
    .status-late { background: #ffc107; color: #333; }
    .status-present { background: #198754; color: white; }
    .status-absent { background: #dc3545; color: white; }
    .status-leave { background: #0dcaf0; color: white; }
    .status-activity { background: #8e44ad; color: white; }
    .nav-link, .navbar-brand { color: white !important; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark" style="background:#222;">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-mortarboard-fill me-2"></i>ตะกั่วทุ่งงานทวีวิทยาคม</a>
    <div id="userBadge" class="d-flex align-items-center"></div>
  </div>
</nav>

<div class="container py-3">
  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h4 class="mb-0"><i class="bi bi-qr-code-scan me-2"></i>สแกน QR เช็คชื่อ</h4>
    <div class="d-flex gap-2">
      <a href="/qr-book.html" class="btn btn-sm btn-outline-light" title="พิมพ์สมุด QR">
        <i class="bi bi-printer me-1"></i>สมุด QR
      </a>
      <a href="/qr-cards.html" class="btn btn-sm btn-outline-light" title="พิมพ์บัตรนักเรียน">
        <i class="bi bi-credit-card-2-front me-1"></i>บัตรนักเรียน
      </a>
      <a href="/" class="btn btn-sm btn-outline-light">
        <i class="bi bi-arrow-left me-1"></i>กลับ
      </a>
    </div>
  </div>

  <!-- Status selector -->
  <div class="scan-status">
    <label class="fw-600 small mb-2">บันทึกเป็นสถานะ:</label>
    <div class="btn-group w-100" role="group">
      <input type="radio" class="btn-check" name="scanStatus" id="sLate" value="late" checked>
      <label class="btn btn-outline-warning" for="sLate"><i class="bi bi-clock me-1"></i>มาสาย</label>

      <input type="radio" class="btn-check" name="scanStatus" id="sPresent" value="present">
      <label class="btn btn-outline-success" for="sPresent"><i class="bi bi-check-circle me-1"></i>มา</label>

      <input type="radio" class="btn-check" name="scanStatus" id="sAbsent" value="absent">
      <label class="btn btn-outline-danger" for="sAbsent"><i class="bi bi-x-circle me-1"></i>ขาด</label>
    </div>
    <div class="small text-warning mt-2" id="dateInfo">
      <i class="bi bi-calendar3 me-1"></i><span id="dateText">-</span>
    </div>
    <div class="small mt-1" id="lateHint" style="color:#8fd19e;">
      <i class="bi bi-shield-check me-1"></i>โหมด "มาสาย" — ครูเวรสแกนได้ทุกห้อง
    </div>
  </div>

  <!-- Safety options -->
  <div class="scan-status" style="background:rgba(255,255,255,.06);">
    <div class="row g-2 align-items-center">
      <div class="col-12 col-md-6">
        <label class="small fw-600 d-block mb-1">🎯 ขนาดกรอบสแกน</label>
        <div class="btn-group btn-group-sm w-100" role="group">
          <input type="radio" class="btn-check" name="boxSize" id="boxSm" value="0.45">
          <label class="btn btn-outline-light" for="boxSm">เล็ก (แม่น)</label>
          <input type="radio" class="btn-check" name="boxSize" id="boxMd" value="0.55" checked>
          <label class="btn btn-outline-light" for="boxMd">กลาง</label>
          <input type="radio" class="btn-check" name="boxSize" id="boxLg" value="0.7">
          <label class="btn btn-outline-light" for="boxLg">ใหญ่ (เร็ว)</label>
        </div>
      </div>
      <div class="col-12 col-md-6 small" style="color:#8fd19e;">
        <i class="bi bi-shield-check me-1"></i>
        สแกนแล้วจะแสดง <b>ชื่อ + รูป</b> ให้ตรวจก่อน<br>
        บันทึกเมื่อกดปุ่ม <b>"บันทึก"</b> เท่านั้น
      </div>
    </div>
  </div>

  <!-- Camera -->
  <div id="reader"></div>
  <div class="text-center mt-2 small text-warning">
    <i class="bi bi-info-circle me-1"></i>
    วาง QR ให้อยู่ในกรอบเดียวเท่านั้น — ใช้นิ้วบังตัวข้างเคียงถ้าจำเป็น
  </div>

  <!-- Confirm Banner -->
  <div id="confirmBanner">
    <div id="cbPhoto"></div>
    <div class="cb-info">
      <div class="name" id="cbName">-</div>
      <div class="meta" id="cbMeta">-</div>
    </div>
    <div class="cb-status" id="cbStatus">-</div>
    <div class="cb-actions">
      <button class="cb-cancel" onclick="cancelConfirm()">❌ ยกเลิก</button>
      <button class="cb-ok" onclick="okConfirm()">✅ บันทึก</button>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mt-3 mb-2">
    <div>
      <span class="badge bg-success fs-6 me-1" id="scanCount">0</span>
      <span class="text-light">สแกนแล้ว</span>
    </div>
    <button class="btn btn-sm btn-outline-light" onclick="toggleSound()" id="soundBtn">
      <i class="bi bi-volume-up"></i> เสียง: เปิด
    </button>
  </div>

  <!-- Recent scans -->
  <h6 class="mt-3 text-light"><i class="bi bi-clock-history me-1"></i>ผลล่าสุด</h6>
  <div id="recentScans">
    <div class="text-muted small text-center py-3">— ยังไม่มีการสแกน —</div>
  </div>
</div>

<!-- Audio for feedback -->
<audio id="beepOk" preload="auto">
  <source src="data:audio/wav;base64,UklGRkQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YSAAAACBAYEBgQGBAYEBgQGBAYEBgQGBAYEBgQGBAYEBgQGBAYEB" type="audio/wav">
</audio>
<audio id="beepErr" preload="auto">
  <source src="data:audio/wav;base64,UklGRkQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YSAAAACBAYEBgQGBAYEBgQGBAYEBgQGBAYEBgQGBAYEBgQGBAYEB" type="audio/wav">
</audio>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="/js/common.js"></script>
<script>
let scanner = null;
let scanCount = 0;
let lastScannedId = null;
let lastScannedTime = 0;
let soundOn = true;
let scanPaused = false;          // pause หลังสแกนแต่ละครั้ง
let pendingConfirm = null;       // {sid, status}
const SCAN_DEDUP_MS = 3000;
const PAUSE_AFTER_SCAN_MS = 1500;

document.addEventListener('DOMContentLoaded', async () => {
  await loadCurrentUser();
  document.getElementById('dateText').textContent = formatThaiDateFull(todayISO());
  // โหลด preferences จาก localStorage
  const savedBoxSize = localStorage.getItem('scanBoxSize') || '0.55';
  const r = document.querySelector(`input[name="boxSize"][value="${savedBoxSize}"]`);
  if (r) r.checked = true;

  // Save preferences เมื่อเปลี่ยน
  document.querySelectorAll('input[name="boxSize"]').forEach(el => {
    el.addEventListener('change', () => {
      localStorage.setItem('scanBoxSize', el.value);
      restartScanner();
    });
  });

  // แสดง/ซ่อน hint "ครูเวรสแกนได้ทุกห้อง" ตามสถานะ
  document.querySelectorAll('input[name="scanStatus"]').forEach(el => {
    el.addEventListener('change', () => {
      const isLate = document.querySelector('input[name="scanStatus"]:checked').value === 'late';
      const hint = document.getElementById('lateHint');
      if (hint) hint.style.display = isLate ? '' : 'none';
    });
  });

  startScanner();
});

function getBoxRatio() {
  const v = document.querySelector('input[name="boxSize"]:checked')?.value;
  return parseFloat(v || '0.55');
}

async function restartScanner() {
  if (scanner) {
    try { await scanner.stop(); } catch (e) {}
    try { await scanner.clear(); } catch (e) {}
    scanner = null;
  }
  startScanner();
}

function startScanner() {
  scanner = new Html5Qrcode('reader');
  const ratio = getBoxRatio();
  const qrboxFunc = (vw, vh) => {
    const minEdge = Math.min(vw, vh);
    const size = Math.max(120, Math.floor(minEdge * ratio));
    return { width: size, height: size };
  };
  scanner.start(
    { facingMode: 'environment' },
    {
      fps: 12,
      qrbox: qrboxFunc,
      aspectRatio: 1.0,
      disableFlip: true,
      experimentalFeatures: { useBarCodeDetectorIfSupported: true },
    },
    onScanSuccess,
    () => {}
  ).catch(err => {
    document.getElementById('reader').innerHTML =
      `<div class="alert alert-danger m-3">เปิดกล้องไม่ได้: ${err}<br>
       กรุณาอนุญาตการใช้กล้องในเบราว์เซอร์</div>`;
  });
}

function pauseCamera(ms) {
  scanPaused = true;
  const reader = document.getElementById('reader');
  reader.classList.add('cam-pause');
  setTimeout(() => {
    scanPaused = false;
    reader.classList.remove('cam-pause');
  }, ms);
}

async function onScanSuccess(decodedText) {
  // ถ้ากล้อง paused (หลังสแกนเสร็จ) หรือมี confirm ค้าง — ไม่รับ
  if (scanPaused || pendingConfirm) return;

  // Dedup — ห้ามสแกนคนเดิมซ้ำใน 3 วินาที
  const now = Date.now();
  if (decodedText === lastScannedId && now - lastScannedTime < SCAN_DEDUP_MS) return;
  lastScannedId = decodedText;
  lastScannedTime = now;

  // Extract student_id
  let sid = decodedText.trim();
  const match = sid.match(/[?&]s=(\d+)/);
  if (match) sid = match[1];
  sid = sid.replace(/\D/g, '');
  if (!sid) {
    addRecent({ name: 'QR ไม่ถูกต้อง', detail: decodedText.slice(0, 30) }, 'error');
    playSound('err');
    return;
  }

  const status = document.querySelector('input[name="scanStatus"]:checked').value;

  // แสดงชื่อ+รูปให้ครูดูก่อนเสมอ — บันทึกเมื่อกด "บันทึก" เท่านั้น
  try {
    const stu = await apiFetch(`/api/students/${sid}/basic`);
    showConfirmBanner(stu, status);
  } catch (e) {
    addRecent({ name: e.message, detail: 'sid: ' + sid }, 'error');
    playSound('err');
  }
}

async function commitScan(sid, status) {
  try {
    const res = await apiFetch('/api/attendance/scan', {
      method: 'POST',
      body: JSON.stringify({ student_id: sid, status })
    });
    scanCount++;
    document.getElementById('scanCount').textContent = scanCount;
    addRecent({
      student_id: res.student.id,
      name: res.student.name,
      class: `ม.${res.student.class_level}/${res.student.room}`,
      number: res.student.number,
      photo: res.student.photo,
      status: res.status,
      date: res.date,
      wasAlready: res.was_already,
      previousStatus: res.previous_status,
    }, res.was_already ? 'was-already' : 'success');
    playSound('ok');
  } catch (e) {
    addRecent({ name: e.message, detail: 'sid: ' + sid }, 'error');
    playSound('err');
  }
}

function showConfirmBanner(stu, status) {
  const STATUS_LABEL = {
    late: 'มาสาย', present: 'มา', absent: 'ขาด',
    leave: 'ลา', activity: 'ไปกิจกรรม'
  };
  const STATUS_COLOR = {
    late: '#ffc107', present: '#198754', absent: '#dc3545',
    leave: '#0dcaf0', activity: '#8e44ad'
  };

  const banner = document.getElementById('confirmBanner');
  banner.style.background = 'rgba(13, 59, 142, .98)';
  document.getElementById('cbPhoto').innerHTML = stu.photo
    ? `<img class="cb-photo" src="/photos/${stu.photo}">`
    : `<div class="cb-photo d-flex align-items-center justify-content-center" style="font-size:1.7rem;">👤</div>`;
  document.getElementById('cbName').textContent = stu.name;
  document.getElementById('cbMeta').textContent =
    `ม.${stu.class_level}/${stu.room}` + (stu.number ? ` • เลขที่ ${stu.number}` : '');
  const cbStatus = document.getElementById('cbStatus');
  cbStatus.textContent = STATUS_LABEL[status] || status;
  cbStatus.style.background = STATUS_COLOR[status] || '#666';

  banner.classList.add('show');
  playSound('ok');

  // รอครูกด "บันทึก" เท่านั้น — ไม่บันทึกอัตโนมัติ
  pendingConfirm = { sid: stu.id, status };
}

async function okConfirm() {
  if (!pendingConfirm) return;
  const { sid, status } = pendingConfirm;
  pendingConfirm = null;
  hideConfirmBanner();
  await commitScan(sid, status);
  pauseCamera(PAUSE_AFTER_SCAN_MS);
}

function cancelConfirm() {
  if (!pendingConfirm) return;
  pendingConfirm = null;
  hideConfirmBanner();
  // เคลียร์ dedup เพื่อให้สแกนคนเดียวกันซ้ำได้ทันที (กรณีต้องสแกนใหม่)
  lastScannedId = null;
  lastScannedTime = 0;
  playSound('err');
}

function hideConfirmBanner() {
  document.getElementById('confirmBanner').classList.remove('show');
}

function addRecent(item, kind) {
  const list = document.getElementById('recentScans');
  if (list.firstElementChild?.classList?.contains('text-muted')) list.innerHTML = '';

  const STATUS_LABEL = {
    late: 'มาสาย', present: 'มา', absent: 'ขาด',
    leave: 'ลา', activity: 'ไปกิจกรรม'
  };

  const photo = item.photo
    ? `<img src="/photos/${item.photo}" style="width:42px;height:42px;border-radius:50%;object-fit:cover;">`
    : `<i class="bi bi-person-circle fs-2"></i>`;

  const statusBadge = item.status
    ? `<span class="status-pill status-${item.status}">${STATUS_LABEL[item.status] || item.status}</span>`
    : '';

  const alreadyNote = item.wasAlready
    ? `<small class="text-warning">⚠ เคยบันทึกเป็น ${STATUS_LABEL[item.previousStatus] || item.previousStatus} แล้ว — อัพเดทใหม่</small>`
    : '';

  // ปุ่มลบ (เฉพาะรายการที่สแกนสำเร็จ ไม่ใช่ error)
  const undoBtn = (kind !== 'error' && item.student_id)
    ? `<button class="btn-undo" onclick="undoScan(this, ${item.student_id}, '${item.date || ''}')">
         <i class="bi bi-x-lg"></i> ลบ
       </button>`
    : '';

  const div = document.createElement('div');
  div.className = `recent-scan ${kind}`;
  div.innerHTML = `
    ${kind !== 'error' ? photo : '<i class="bi bi-x-octagon fs-2 text-danger"></i>'}
    <div class="flex-grow-1">
      <div class="fw-bold">${item.name}</div>
      <div class="small">
        ${item.class ? item.class + (item.number ? ` • เลขที่ ${item.number}` : '') : (item.detail || '')}
      </div>
      ${alreadyNote}
    </div>
    <div class="d-flex align-items-center gap-2">
      ${statusBadge}
      ${undoBtn}
    </div>
  `;
  list.prepend(div);
  // Keep only 20 latest
  while (list.children.length > 20) list.lastElementChild.remove();
}

async function undoScan(btn, sid, date) {
  const row = btn.closest('.recent-scan');
  const name = row.querySelector('.fw-bold')?.textContent || 'รายการนี้';
  if (!confirm(`ลบรายการของ "${name}" ออกจริงๆ?`)) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

  try {
    await apiFetch('/api/attendance/scan', {
      method: 'DELETE',
      body: JSON.stringify({ student_id: sid, date: date || undefined })
    });
    // ทำ effect ตัดออก
    row.classList.add('removed');
    btn.innerHTML = '<i class="bi bi-check2"></i> ลบแล้ว';
    // ลด scan counter
    scanCount = Math.max(0, scanCount - 1);
    document.getElementById('scanCount').textContent = scanCount;
    // ถ้า student ID นี้คือ lastScannedId — reset เพื่อให้สแกนใหม่ได้
    if (String(sid) === String(lastScannedId)) {
      lastScannedId = null;
      lastScannedTime = 0;
    }
    // ลบออกจาก list หลัง 1.5 วินาที
    setTimeout(() => row.remove(), 1500);
  } catch (e) {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-x-lg"></i> ลบ';
    alert('ลบไม่สำเร็จ: ' + e.message);
  }
}

function playSound(type) {
  if (!soundOn) return;
  if (type === 'ok') {
    beep(800, 100);
  } else {
    beep(300, 200);
    setTimeout(() => beep(300, 200), 220);
  }
}

function beep(freq, ms) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + ms / 1000);
    setTimeout(() => { osc.stop(); ctx.close(); }, ms);
  } catch {}
}

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundBtn').innerHTML = soundOn
    ? '<i class="bi bi-volume-up"></i> เสียง: เปิด'
    : '<i class="bi bi-volume-mute"></i> เสียง: ปิด';
}
</script>
</body>
</html>
