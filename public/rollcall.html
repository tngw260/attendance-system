<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ใบเช็คชื่อนักเรียน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <style>
    body { background: white; }
    .print-controls { padding: 1rem; background: #f0f4fb; border-bottom: 2px solid var(--primary); }
    .rollcall-sheet {
      max-width: 794px; margin: 1rem auto; background: white;
      padding: 24px 32px; box-shadow: 0 2px 12px rgba(0,0,0,.1);
    }
    .rc-header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 16px; }
    .rc-header h2 { margin: 0; font-size: 1.4rem; font-weight: 700; }
    .rc-header h3 { margin: 2px 0; font-size: 1.1rem; font-weight: 600; }
    .rc-meta { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: .95rem; }
    .rc-meta input[type=text] {
      border: none; border-bottom: 1px dotted #555; padding: 0 4px; width: 180px;
    }
    table.rc-table { width: 100%; border-collapse: collapse; font-size: .92rem; }
    table.rc-table th, table.rc-table td {
      border: 1px solid #555; padding: 5px 8px; vertical-align: middle;
    }
    table.rc-table th { background: #e9ecef; text-align: center; }
    .check-cell { width: 32px; height: 28px; text-align: center; }
    .sig-section { margin-top: 32px; display: flex; justify-content: space-around; }
    .sig-section .sig { text-align: center; min-width: 220px; }
    .sig-line { border-bottom: 1px dotted #555; height: 32px; margin-bottom: 4px; }
    @media print {
      body { margin: 0; }
      .print-controls, nav { display: none !important; }
      .rollcall-sheet { margin: 0; padding: 12mm 16mm; box-shadow: none; max-width: 100%; }
      @page { size: A4; margin: 0; }
    }
  </style>
</head>
<body>

<div class="print-controls d-flex justify-content-between align-items-center">
  <div>
    <a href="/" class="btn btn-sm btn-outline-primary"><i class="bi bi-house"></i> หน้าหลัก</a>
    <span class="ms-2 text-muted">ใบเช็คชื่อสำหรับพิมพ์</span>
  </div>
  <div class="d-flex gap-2 align-items-center">
    <select id="selLevel" class="form-select form-select-sm" style="width:auto;">
      <option value="1">ม.1</option><option value="2">ม.2</option><option value="3">ม.3</option>
      <option value="4">ม.4</option><option value="5">ม.5</option><option value="6">ม.6</option>
    </select>
    <select id="selRoom" class="form-select form-select-sm" style="width:auto;"></select>
    <button onclick="load()" class="btn btn-sm btn-primary"><i class="bi bi-arrow-clockwise"></i> โหลด</button>
    <button onclick="window.print()" class="btn btn-sm btn-success"><i class="bi bi-printer-fill"></i> พิมพ์</button>
  </div>
</div>

<div class="rollcall-sheet" id="sheet">
  <div class="text-center text-muted py-5">เลือกชั้น/ห้อง แล้วกด "โหลด"</div>
</div>

<script src="/js/common.js"></script>
<script>
const params = new URLSearchParams(location.search);

document.addEventListener('DOMContentLoaded', async () => {
  await loadCurrentUser();
  await loadClasses();
  if (params.get('level')) document.getElementById('selLevel').value = params.get('level');
  await updateRooms();
  if (params.get('room')) document.getElementById('selRoom').value = params.get('room');
  if (params.get('level') && params.get('room')) load();
});

let allClasses = [];

async function loadClasses() {
  try { allClasses = await apiFetch('/api/classes'); } catch {}
}

document.getElementById('selLevel').addEventListener('change', updateRooms);

function updateRooms() {
  const level = document.getElementById('selLevel').value;
  const rooms = allClasses.filter(c => String(c.class_level) === level);
  const sel = document.getElementById('selRoom');
  sel.innerHTML = '';
  rooms.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.room; opt.textContent = `ห้อง ${c.room}`;
    sel.appendChild(opt);
  });
}

async function load() {
  const level = document.getElementById('selLevel').value;
  const room = document.getElementById('selRoom').value;
  if (!level || !room) return;

  try {
    const d = await apiFetch(`/api/rollcall/print?level=${level}&room=${room}`);
    render(d);
  } catch (e) {
    document.getElementById('sheet').innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
  }
}

function render(d) {
  const monthHeaders = [];
  for (let i = 1; i <= 25; i++) monthHeaders.push(`<th class="check-cell">${i}</th>`);

  let rows = '';
  d.students.forEach(s => {
    let cells = '';
    for (let i = 0; i < 25; i++) cells += '<td class="check-cell"></td>';
    rows += `<tr>
      <td class="text-center">${s.number ?? ''}</td>
      <td>${s.name}</td>
      ${cells}
    </tr>`;
  });

  document.getElementById('sheet').innerHTML = `
    <div class="rc-header">
      <h2>โรงเรียนตะกั่วทุ่งงานทวีวิทยาคม</h2>
      <h3>ใบเช็คชื่อนักเรียน ชั้นมัธยมศึกษาปีที่ ${d.level}/${d.room}</h3>
    </div>
    <div class="rc-meta">
      <div>ครูที่ปรึกษา: <input type="text"></div>
      <div>เดือน: <input type="text" value="${THAI_MONTHS[new Date().getMonth()]}"> ปี: <input type="text" style="width:80px;" value="${new Date().getFullYear()+543}"></div>
    </div>
    <table class="rc-table">
      <thead>
        <tr>
          <th style="width:36px;">เลขที่</th>
          <th>ชื่อ-นามสกุล</th>
          ${monthHeaders.join('')}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="sig-section">
      <div class="sig"><div class="sig-line"></div>(.............................................)<br>ครูที่ปรึกษา</div>
      <div class="sig"><div class="sig-line"></div>(.............................................)<br>หัวหน้าระดับ</div>
    </div>
  `;
}
</script>
</body>
</html>
