<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายงานการเข้าใช้ห้องสมุด</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <style>
    .controls { background:#f0f4fb; padding:12px 0; border-bottom:2px solid var(--primary); }
    .doc { width:210mm; min-height:297mm; margin:12px auto; background:#fff; color:#000;
      padding:15mm 18mm; box-sizing:border-box; box-shadow:0 2px 14px rgba(0,0,0,.15);
      font-family:'TH Sarabun PSK','Sarabun',sans-serif; font-size:16pt; }
    .doc-head { text-align:center; margin-bottom:4mm; }
    .doc-head .logo { width:18mm; height:18mm; object-fit:contain; }
    .doc-head h2 { font-size:18pt; font-weight:700; margin:1mm 0 0; }
    .doc-head .sub { font-size:15pt; color:#333; }
    table.rpt { width:100%; border-collapse:collapse; font-size:15pt; }
    table.rpt th, table.rpt td { border:1px solid #000; padding:1mm 2mm; }
    table.rpt th { background:#e8eef7; text-align:center; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    table.rpt td.c { text-align:center; }
    @media print {
      .no-print, nav { display:none !important; }
      .doc { box-shadow:none; margin:0; padding:15mm 18mm; }
      @page { size:A4; margin:0; }
    }
    [data-theme="dark"] .doc { background:#fff; color:#000; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark no-print">
  <div class="container">
    <a class="navbar-brand" href="/library.html"><i class="bi bi-mortarboard-fill me-2"></i>ตะกั่วทุ่งงานทวีวิทยาคม</a>
    <div id="userBadge" class="d-flex align-items-center"></div>
  </div>
</nav>

<div class="controls no-print">
  <div class="container">
    <div class="row g-2 align-items-end">
      <div class="col-6 col-md-3">
        <label class="form-label small fw-600 mb-1">ตั้งแต่วันที่</label>
        <input type="date" id="start" class="form-control form-control-sm">
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label small fw-600 mb-1">ถึงวันที่</label>
        <input type="date" id="end" class="form-control form-control-sm">
      </div>
      <div class="col-8 col-md-3">
        <label class="form-label small fw-600 mb-1">ห้อง</label>
        <select id="cls" class="form-select form-select-sm"><option value="">ทั้งโรงเรียน</option></select>
      </div>
      <div class="col-4 col-md-3 d-flex gap-1">
        <button class="btn btn-primary btn-sm flex-fill" onclick="loadRpt()"><i class="bi bi-search"></i></button>
        <button class="btn btn-dark btn-sm flex-fill" onclick="window.print()" id="printBtn" disabled><i class="bi bi-printer-fill"></i></button>
      </div>
    </div>
    <div class="small text-muted mt-2"><i class="bi bi-info-circle me-1"></i>เลือกช่วงวันที่แล้วกดค้นหา → กดพิมพ์เพื่อออกรายงาน</div>
  </div>
</div>

<div id="content">
  <div class="doc"><div class="text-center text-muted py-5"><i class="bi bi-journal-text fs-1 d-block mb-2"></i>เลือกช่วงวันที่แล้วกดค้นหา</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
<script>
let school='โรงเรียนตะกั่วทุ่งงานทวีวิทยาคม', logo='';
function thDate(iso){ if(!iso) return '-';
  const m=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const d=new Date(iso+'T00:00:00'); if(isNaN(d)) return iso;
  return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()+543}`; }

document.addEventListener('DOMContentLoaded', async () => {
  await loadCurrentUser();
  const t = todayISO();
  document.getElementById('start').value = t;
  document.getElementById('end').value = t;
  try {
    const th = await (await fetch('/api/public/theme')).json();
    if (th.school_name) school = th.school_name;
    if (th.school_logo) logo = th.school_logo;
    const classes = await apiFetch('/api/classes');
    const sel = document.getElementById('cls');
    const g={}; classes.forEach(c=>(g[c.class_level]=g[c.class_level]||[]).push(c));
    Object.keys(g).sort((a,b)=>+a-+b).forEach(lv=>{
      const og=document.createElement('optgroup'); og.label=`ม.${lv}`;
      g[lv].forEach(c=>{const o=document.createElement('option'); o.value=`${c.class_level}_${c.room}`; o.textContent=`ม.${c.class_level}/${c.room}`; og.appendChild(o);});
      sel.appendChild(og);
    });
  } catch(e){ showToast(e.message,'danger'); }
  loadRpt();
});

async function loadRpt() {
  const start=document.getElementById('start').value, end=document.getElementById('end').value;
  let qs=`start=${start}&end=${end}`;
  const cv=document.getElementById('cls').value;
  if (cv){ const [l,r]=cv.split('_'); qs+=`&level=${l}&room=${r}`; }
  document.getElementById('content').innerHTML='<div class="doc"><div class="text-center py-5"><div class="spinner-border text-primary"></div></div></div>';
  try {
    const list = await apiFetch(`/api/library/visits?${qs}`);
    const logoHtml = logo ? `<img class="logo" src="${logo}">` : '';
    const range = start===end ? thDate(start) : `${thDate(start)} — ${thDate(end)}`;
    const rows = list.length ? list.slice().reverse().map((v,i)=>`
      <tr>
        <td class="c">${i+1}</td>
        <td>${v.name}</td>
        <td class="c">ม.${v.class_level}/${v.room}</td>
        <td class="c">${thDate(v.visit_date)}</td>
        <td class="c">${v.check_in}</td>
        <td class="c">${v.check_out||'-'}</td>
      </tr>`).join('') : '<tr><td colspan="6" class="c" style="padding:6mm;">— ไม่มีข้อมูลในช่วงนี้ —</td></tr>';
    document.getElementById('content').innerHTML = `
      <div class="doc">
        <div class="doc-head">${logoHtml}
          <h2>รายงานการเข้าใช้ห้องสมุด</h2>
          <div class="sub">${school}</div>
          <div class="sub">ระหว่างวันที่ ${range} • รวม ${list.length} ครั้ง</div>
        </div>
        <table class="rpt">
          <thead><tr>
            <th style="width:12mm;">ที่</th><th>ชื่อ-สกุล</th><th style="width:22mm;">ชั้น</th>
            <th style="width:34mm;">วันที่</th><th style="width:22mm;">เวลาเข้า</th><th style="width:22mm;">เวลาออก</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div style="margin-top:10mm; text-align:right;">
          <div>ลงชื่อ ……………………………………… ครูบรรณารักษ์</div>
        </div>
      </div>`;
    document.getElementById('printBtn').disabled = !list.length;
  } catch(e){ document.getElementById('content').innerHTML=`<div class="doc"><div class="alert alert-danger m-3">${e.message}</div></div>`; }
}
</script>
</body>
</html>
