<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบฟอร์ม ปค. — งานกิจการนักเรียน</title>
  <!-- Sarabun (Google) = ฟอนต์เอกสารราชการ ใช้แทน TH Sarabun PSK บนเว็บ -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <style>
    /* ===== A4 document ===== */
    .doc-page {
      width: 210mm;
      min-height: 297mm;
      margin: 14px auto;
      background: white;
      color: #000;
      padding: 18mm 20mm;
      box-sizing: border-box;
      box-shadow: 0 2px 14px rgba(0,0,0,.15);
      /* ใช้ PSK ในเครื่องก่อน (ตรงเอกสารราชการ) ถ้าไม่มี → Sarabun จาก Google */
      font-family: 'TH Sarabun PSK', 'TH SarabunPSK', 'TH Sarabun New', 'Sarabun', sans-serif;
      font-size: 12pt;
      line-height: 1.35;
    }
    .doc-page .pc-tag {
      position: absolute;
      font-weight: 700;
      font-size: 13pt;
    }
    .doc-head { text-align: center; margin-bottom: 4mm; }
    .doc-head .logo { width: 17mm; height: 17mm; object-fit: contain; }
    .doc-head h2 { font-size: 15pt; font-weight: 700; margin: 1.5mm 0 0; }
    .doc-head .sub { font-size: 12pt; }
    .doc-title {
      text-align: center; font-size: 15pt; font-weight: 700;
      margin: 3mm 0 5mm; text-decoration: underline;
    }
    .doc-body p { margin: 0 0 2mm; text-indent: 0; }
    .fill { border-bottom: 1px dotted #000; padding: 0 4px; }
    .fill-inline { display: inline-block; min-width: 40mm; border-bottom: 1px dotted #000; padding: 0 4px; text-align: center; }
    .editable {
      background: #fffbe6;
      outline: none;
      min-width: 30mm;
      display: inline-block;
      border-bottom: 1px dotted #888;
      padding: 0 4px;
    }
    .editable:focus { background: #fff3b0; }

    /* signature grid */
    .sign-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6mm 10mm; margin-top: 8mm; text-align: center;
    }
    .sign-grid .sign-cell { font-size: 12pt; }
    .sign-line { margin-bottom: 1mm; }
    .director-sign { text-align: center; margin-top: 6mm; font-size: 12pt; }

    /* ปค.5 table */
    table.pc5 { width: 100%; border-collapse: collapse; font-size: 10pt; margin-top: 3mm; table-layout: fixed; }
    table.pc5 th, table.pc5 td { border: 1px solid #000; padding: 1.2mm 1.2mm; vertical-align: top; word-wrap: break-word; }
    table.pc5 td:first-child { white-space: normal !important; }  /* วันที่ขึ้นบรรทัดได้ ไม่ทับชื่อ */
    table.pc5 th { text-align: center; font-weight: 700; background: #f0f0f0;
                   -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    table.pc5 td.c { text-align: center; }

    .controls { background: #f0f4fb; padding: 14px 0; border-bottom: 2px solid var(--primary); }

    @media print {
      body { background: white; }
      .no-print, nav { display: none !important; }
      .doc-page { box-shadow: none; margin: 0; padding: 16mm 18mm; }
      .editable { background: transparent !important; border-bottom: 1px dotted #000; }
      @page { size: A4; margin: 0; }
    }
    [data-theme="dark"] .doc-page { color: #000; }  /* เอกสารคงสีขาวเสมอ */
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark no-print">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-mortarboard-fill me-2"></i>ตะกั่วทุ่งงานทวีวิทยาคม</a>
    <div id="userBadge" class="d-flex align-items-center"></div>
  </div>
</nav>

<div class="controls no-print">
  <div class="container">
    <div class="row g-2 align-items-end">
      <div class="col-md-3">
        <label class="form-label small fw-600 mb-1">เลือกแบบฟอร์ม</label>
        <select id="selForm" class="form-select form-select-sm" onchange="render()">
          <option value="pc1">ปค.1 — บันทึกการกระทำผิดของนักเรียน</option>
          <option value="pc3">ปค.3 — บันทึกการทำทัณฑ์บนนักเรียน</option>
          <option value="pc4">ปค.4 — ตัดคะแนนความประพฤติ</option>
          <option value="pc5">ปค.5 — บันทึกพฤติกรรมรายบุคคล</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label small fw-600 mb-1">เลือกนักเรียน</label>
        <select id="selStudent" class="form-select form-select-sm" onchange="loadStudent()">
          <option value="">-- เลือกนักเรียน --</option>
        </select>
      </div>
      <div class="col-md-3" id="logPickWrap" style="display:none;">
        <label class="form-label small fw-600 mb-1">เลือกรายการที่จะออกใบ (ปค.4)</label>
        <select id="selLog" class="form-select form-select-sm" onchange="render()">
          <option value="">-- ทั้งหมด/ล่าสุด --</option>

      <div class="col-md-2">
        <button class="btn btn-success btn-sm w-100" onclick="window.print()" id="printBtn" disabled>

        </button>
      </div>

    <div class="small text-muted mt-2">
      <i class="bi bi-info-circle me-1"></i>
      ช่องสีเหลืองแก้ไขได้ก่อนพิมพ์ (คลิกพิมพ์ทับได้เลย) • ข้อมูลชื่อ/ชั้น/คะแนน ดึงจากระบบอัตโนมัติ
    </div>
  </div>
</div>

<div id="content">
  <div class="doc-page">
    <div class="text-center text-muted py-5">
      <i class="bi bi-file-earmark-text fs-1 d-block mb-2"></i>
      เลือกแบบฟอร์มและนักเรียน เพื่อสร้างเอกสาร

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
<script>
const THAI_MONTHS_F = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
let theme = {};
let curData = null;   // { student, logs, score, start_score }

document.addEventListener('DOMContentLoaded', async () => {
  await loadCurrentUser();
  try { theme = await (await fetch('/api/public/theme')).json(); } catch(e){}
  await loadStudentList();
});

async function loadStudentList() {
  try {
    const students = await apiFetch('/api/students');
    const sel = document.getElementById('selStudent');
    const grouped = {};
    students.forEach(s => {
      const k = `ม.${s.class_level}/${s.room}`;
      (grouped[k] = grouped[k] || []).push(s);
    });
    Object.keys(grouped).sort().forEach(k => {
      const og = document.createElement('optgroup'); og.label = k;
      grouped[k].forEach(s => {
        const o = document.createElement('option');
        o.value = s.id; o.textContent = `${s.number ? s.number+'. ':''}${s.name}`;
        og.appendChild(o);
      });
      sel.appendChild(og);
    });
  } catch(e){ alert(e.message); }
}

async function loadStudent() {
  const sid = document.getElementById('selStudent').value;
  if (!sid) { curData = null; render(); return; }
  try {
    curData = await apiFetch(`/api/behavior/${sid}`);
    // เติม dropdown รายการตัดคะแนน (เฉพาะที่หักคะแนน points<0) สำหรับ ปค.4
    const selLog = document.getElementById('selLog');
    selLog.innerHTML = '<option value="">-- ล่าสุด --</option>';
    (curData.logs||[]).filter(l => l.points < 0).forEach(l => {
      const o = document.createElement('option');
      o.value = l.id;
      o.textContent = `${pcDateShort(l.date)} • ${l.reason} (${l.points})`;
      selLog.appendChild(o);
    });
    render();
  } catch(e){ alert(e.message); }
}

function thaiDateLong(iso) {
  if (!iso) return { d:'', m:'', y:'' };
  const dt = new Date(iso + 'T00:00:00');
  return { d: dt.getDate(), m: THAI_MONTHS_F[dt.getMonth()], y: dt.getFullYear()+543 };
}
function pcDateShort(iso){
  if(!iso) return '-';
  const dt = new Date(iso+'T00:00:00');
  return `${dt.getDate()} ${THAI_MONTHS_F[dt.getMonth()].slice(0,3)} ${dt.getFullYear()+543}`;
}
function namePrefix(s){
  if (/^(เด็กชาย|เด็กหญิง|นาย|นางสาว|ด\.ช\.|ด\.ญ\.)/.test(s.name||'')) return s.name;
  return s.name || '';
}
// ชื่อสำหรับฟอร์มที่มี (ด.ช./ด.ญ./นาย/นางสาว) นำให้วงเลือก → ตัดคำนำหน้าออก เหลือชื่อ-สกุล
function studentFullName(s){
  let n = s.name || '';
  return n.replace(/^(เด็กชาย|เด็กหญิง|นางสาว|นาย|ด\.ช\.|ด\.ญ\.)\s*/, '').trim();
}

function el(id){ return document.getElementById(id); }
function schoolName(){ return theme.school_name || 'โรงเรียนตะกั่วทุ่งงานทวีวิทยาคม'; }
function directorName(){ return theme.director_name || 'นางสาวปัทมา จีนดี'; }
function directorTitle(){ return theme.director_title || 'ผู้อำนวยการ'; }
function logoTag(){ return theme.school_logo ? `<img class="logo" src="${theme.school_logo}">` : ''; }

function render() {
  const form = el('selForm').value;
  el('logPickWrap').style.display = (form === 'pc4') ? '' : 'none';
  if (!curData) {
    el('content').innerHTML = `<div class="doc-page"><div class="text-center text-muted py-5">
      <i class="bi bi-person-x fs-1 d-block mb-2"></i>กรุณาเลือกนักเรียน</div></div>`;
    el('printBtn').disabled = true;
    return;
  }
  el('content').innerHTML = (form === 'pc1') ? renderPC1()
                          : (form === 'pc3') ? renderPC3()
                          : (form === 'pc4') ? renderPC4()
                          : renderPC5();
  el('printBtn').disabled = false;
}

/* ===== ปค.3 — บันทึกการทำทัณฑ์บนนักเรียน ===== */

        หากนักเรียนกระทำผิดระเบียบของโรงเรียนอีกครั้ง จะถือว่าเป็นการฝ่าฝืนทัณฑ์บน ข้าพเจ้ายินยอมให้โรงเรียนพิจารณาดำเนินการตามความเหมาะสม</p>
    </div>

    <div class="sign-grid" style="margin-top:7mm;">
      <div class="sign-cell">
        <div class="sign-line">ลงชื่อ ………………………………………</div>
        <div>(……………………………………)</div>
        <div>นักเรียน</div>
      </div>
      <div class="sign-cell">
        <div class="sign-line">ลงชื่อ ………………………………………</div>
        <div>(……………………………………)</div>
        <div>ผู้ปกครอง</div>
      </div>
      <div class="sign-cell">
        <div class="sign-line">ลงชื่อ ………………………………………</div>
        <div>(……………………………………)</div>
        <div>ครูที่ปรึกษา</div>
      </div>
      <div class="sign-cell">
        <div class="sign-line">ลงชื่อ ………………………………………</div>
        <div>(……………………………………)</div>
        <div>หัวหน้าระดับชั้น</div>
      </div>
    </div>
    <div class="director-sign" style="margin-top:5mm;">
      <div class="sign-line">ลงชื่อ ………………………………………</div>
      <div>(……………………………………)</div>
      <div>หัวหน้างานกิจการนักเรียน</div>
    </div>

    <div style="border:1px solid #000; margin-top:6mm; padding:3mm 5mm;">
      <p style="text-align:center; font-weight:700;">ความเห็นของผู้อำนวยการโรงเรียน</p>
      <p><span class="editable" contenteditable="true" style="display:block;min-height:6mm;"></span></p>

        <div class="sign-line">ลงชื่อ ………………………………………</div>

/* ===== ปค.1 — แบบบันทึกการกระทำผิดของนักเรียน ===== */

/* ===== ปค.4 — แบบฟอร์มตัดคะแนนความประพฤติ ===== */
function renderPC4() {
  const s = curData.student;
  const today = thaiDateLong(new Date().toISOString().split('T')[0]);
  // หา log ที่เลือก
  const logId = el('selLog').value;
  let log = null;

        <span style="font-size:12pt;color:#666;">(คะแนนคงเหลือ ${curData.score})</span></p>

    <div class="sign-grid">

/* ===== ปค.5 — แบบบันทึกพฤติกรรมรายบุคคล (ตาราง) ===== */
function renderPC5() {
  const s = curData.student;
  // เฉพาะที่ครูหักเอง (source=manual) — ตัด มาสาย(attendance) + บำเพ็ญประโยชน์(makeup) + เครื่องแต่งกาย(uniform) ออก
  const logs = (curData.logs||[])
    .filter(l => (l.source === 'manual' || !l.source) && l.points < 0)
    .slice().reverse(); // เก่า→ใหม่
  const totalDeduct = logs.reduce((a,l)=>a+Math.abs(l.points),0);
  const remaining = curData.score;

  let rows = '';
  logs.forEach(l => {
    rows += `<tr>
      <td class="c" style="white-space:normal;">${pcDateShort(l.date)}</td>
      <td>${l.reason || ''}${l.note ? ' — '+l.note : ''}</td>
      <td class="c">${Math.abs(l.points)}</td>
      <td></td><td></td><td></td><td></td>
    </tr>`;
  });
  // เติมแถวว่างให้เต็มหน้า
  const blanks = Math.max(0, 11 - logs.length);
  for (let i=0;i<blanks;i++) rows += `<tr><td style="height:8mm;">&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`;

  return `<div class="doc-page" style="position:relative;">
    <span class="pc-tag" style="top:14mm;right:18mm;">ปค 5</span>
    <div class="doc-head">
      ${logoTag()}
      <h2>แบบบันทึกพฤติกรรมนักเรียน</h2>
    </div>
    <p style="text-align:center; margin:1mm 0;">${schoolName()}
      ภาคเรียนที่ <span class="editable" contenteditable="true" style="min-width:14mm;text-align:center;"></span>
      ปีการศึกษา <span class="editable" contenteditable="true" style="min-width:20mm;text-align:center;"></span></p>
    <p style="text-align:center; margin:1mm 0 3mm;">ชื่อ <span class="fill" style="min-width:65mm;">${studentFullName(s)}</span>
       เลขที่ <span class="fill-inline" style="min-width:14mm;">${s.number ?? ''}</span>
       ห้อง <span class="fill-inline" style="min-width:22mm;">ม.${s.class_level}/${s.room}</span></p>

    <table class="pc5">
      <thead>
        <tr>
          <th rowspan="2" style="width:24mm;">วัน/เดือน/ปี</th>
          <th rowspan="2">พฤติกรรมนักเรียน</th>
          <th rowspan="2" style="width:20mm;">คะแนนพฤติกรรม<br>ที่ถูกหัก</th>
          <th colspan="4">ลงชื่อ</th>
        </tr>
        <tr>
          <th style="width:16mm;">นักเรียน</th>
          <th style="width:18mm;">ครูที่ปรึกษา</th>
          <th style="width:18mm;">หัวหน้า<br>ระดับชั้น</th>
          <th style="width:20mm;">หัวหน้า<br>กิจการนักเรียน</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr>
          <td colspan="2" class="c" style="font-weight:700;">คะแนนพฤติกรรมที่ถูกหักรวม</td>
          <td class="c" style="font-weight:700;">${totalDeduct || ''}</td>
          <td colspan="4"></td>
        </tr>
        <tr>
          <td colspan="2" class="c" style="font-weight:700;">คะแนนพฤติกรรมคงเหลือรวม<br>( ${curData.start_score} คะแนน/ปีการศึกษา )</td>
          <td class="c" style="font-weight:700;">${remaining}</td>
          <td colspan="4"></td>
        </tr>
      </tfoot>
    </table>

    <div class="sign-grid" style="margin-top:8mm;">
      <div class="sign-cell">
        <div class="sign-line">ลงชื่อ ………………………………………</div>
        <div>(……………………………………)</div>
        <div>ครูที่ปรึกษา</div>
      </div>
      <div class="sign-cell">
        <div class="sign-line">ลงชื่อ ………………………………………</div>
        <div>(……………………………………)</div>
        <div>หัวหน้าระดับชั้น</div>
      </div>
    </div>
    <div class="director-sign" style="margin-top:6mm;">
      <div class="sign-line">ลงชื่อ ………………………………………</div>
      <div>(……………………………………)</div>
      <div>หัวหน้างานกิจการนักเรียน</div>
    </div>
    <div class="director-sign" style="margin-top:6mm;">
      <div class="sign-line">ลงชื่อ ………………………………………</div>
      <div>( ${directorName()} )</div>
      <div>ผู้อำนวยการ${schoolName()}</div>
    </div>
  </div>`;
}
