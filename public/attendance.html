<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เช็คชื่อนักเรียน - โรงเรียนตะกั่วทุ่งงานทวีวิทยาคม</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <style>
    .col-lg-2-4 { flex: 0 0 auto; width: 20%; }
    @media(max-width:992px){ .col-lg-2-4 { width: 50%; } }
    @media(max-width:576px){ .col-lg-2-4 { width: 100%; } }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-mortarboard-fill me-2"></i>ตะกั่วทุ่งงานทวีวิทยาคม</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house me-1"></i>หน้าหลัก</a></li>
        <li class="nav-item"><a class="nav-link active" href="/attendance.html"><i class="bi bi-check2-square me-1"></i>เช็คชื่อ</a></li>
        <li class="nav-item"><a class="nav-link" href="/students.html"><i class="bi bi-people me-1"></i>นักเรียน</a></li>
        <li class="nav-item"><a class="nav-link" href="/report.html"><i class="bi bi-bar-chart me-1"></i>รายงาน</a></li>
        <li class="nav-item"><a class="nav-link" href="/behavior-report.html"><i class="bi bi-award me-1"></i>คะแนน</a></li>
        <li class="nav-item admin-only"><a class="nav-link" href="/users.html"><i class="bi bi-shield-lock me-1"></i>ผู้ใช้</a></li>
        <li class="nav-item admin-only"><a class="nav-link" href="/settings.html"><i class="bi bi-gear me-1"></i>ตั้งค่า</a></li>
      </ul>
      <div id="userBadge" class="d-flex align-items-center"></div>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1><i class="bi bi-check2-square me-2"></i>เช็คชื่อนักเรียน</h1>
    <div class="subtitle">บันทึกการเข้าเรียนรายวัน</div>
  </div>
</div>

<div class="container pb-5">

  <!-- Controls -->
  <div class="card mb-4">
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-sm-4">
          <label class="form-label fw-600">ชั้นมัธยมศึกษาปีที่</label>
          <select id="selLevel" class="form-select">
            <option value="">-- เลือกชั้น --</option>
            <option value="1">ม.1</option>
            <option value="2">ม.2</option>
            <option value="3">ม.3</option>
            <option value="4">ม.4</option>
            <option value="5">ม.5</option>
            <option value="6">ม.6</option>
          </select>
        </div>
        <div class="col-sm-3">
          <label class="form-label fw-600">ห้อง</label>
          <select id="selRoom" class="form-select">
            <option value="">-- เลือกห้อง --</option>
          </select>
        </div>
        <div class="col-sm-3">
          <label class="form-label fw-600">วันที่</label>
          <input type="date" id="selDate" class="form-control" value="">
        </div>
        <div class="col-sm-2">
          <label class="form-label fw-600">&nbsp;</label>
          <div class="d-flex gap-1">
            <button id="btnLoad" class="btn btn-primary fw-bold flex-grow-1" onclick="loadAttendance()">
              <i class="bi bi-arrow-down-circle me-1"></i>โหลด
            </button>
            <button id="btnPrint" class="btn btn-outline-secondary" onclick="printRollcall()" title="พิมพ์ใบเช็คชื่อเปล่า">
              <i class="bi bi-printer"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Counter bar -->
  <div id="counterSection" style="display:none;" class="mb-3">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div class="counter-bar" id="counterBar">
        <span class="counter-pill present"><i class="bi bi-check-circle-fill"></i> มา: <strong id="cntPresent">0</strong></span>
        <span class="counter-pill absent"><i class="bi bi-x-circle-fill"></i> ขาด: <strong id="cntAbsent">0</strong></span>
        <span class="counter-pill late"><i class="bi bi-clock-fill"></i> มาสาย: <strong id="cntLate">0</strong></span>
        <span class="counter-pill leave"><i class="bi bi-calendar-minus-fill"></i> ลา: <strong id="cntLeave">0</strong></span>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-success" onclick="setAll('present')">
          <i class="bi bi-check-all"></i> ทุกคนมา
        </button>
      </div>
    </div>
  </div>

  <!-- Student list -->
  <div id="studentSection">
    <div class="text-center text-muted py-5" id="emptyMsg">
      <i class="bi bi-arrow-up-circle fs-2 d-block mb-2"></i>
      เลือกชั้นเรียนและวันที่ แล้วกด "โหลด"
    </div>
  </div>

  <!-- Save button (sticky) -->
  <div class="sticky-save mt-4" id="saveSection" style="display:none;">
    <button class="btn btn-success btn-save-big" onclick="saveAttendance()">
      <i class="bi bi-save2-fill me-2"></i>บันทึกการเช็คชื่อ
    </button>
  </div>

</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="mainToast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body fw-500"></div>
      <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
<script src="/js/attendance.js"></script>
</body>
</html>
